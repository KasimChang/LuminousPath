<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>四柱八字 - LuminousPath Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, query, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCf5q4CJehSCnml8w_sOC27igtNt637Th4",
            authDomain: "fir-console-86c87.firebaseapp.com",
            projectId: "fir-console-86c87",
            storageBucket: "fir-console-86c87.firebasestorage.app",
            messagingSenderId: "1074159437762",
            appId: "1:1074159437762:web:d6f9a3f81ebeed2ebe785b",
            measurementId: "G-3LB4W975PE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.FirebaseSDK = {
            app, auth, db,
            firebaseConfig, initializeApp, getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut,
            getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, query, limit,
            signInWithCustomToken, signInAnonymously, getRedirectResult, signInWithRedirect
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
        }

        .font-serif {
            font-family: 'Noto Serif TC', serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .fortune-table {
            table-layout: fixed;
            width: 100%;
            border-collapse: collapse;
        }

        .fortune-table td,
        .fortune-table th {
            border: 1px solid rgba(71, 85, 105, 0.4);
            padding: 4px 0px;

            text-align: center;
        }

        .flow-year-row {
            height: 38px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            position: relative;
        }

        .highlight-year {
            background: rgba(234, 179, 8, 0.15) !important;
            box-shadow: inset 0 0 0 1px #eab308;
            border-radius: 2px;
        }

        .safe-top {
            padding-top: env(safe-area-inset-top);
        }

        .loading-shimmer {
            background: linear-gradient(90deg, transparent 25%, rgba(16, 185, 129, 0.1) 50%, transparent 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }
    </style>
</head>

<body class="flex flex-col min-h-screen transition-colors duration-300 text-center">
    <div id="root" class="flex-grow flex flex-col text-center"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback, useRef } = React;

        const ADMIN_UID = "H5dBIA0UxyYo8oV5GZ442u5yZ733";
        const BRANCHES = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const WORKER_URL = "https://luminouspath.l321815.workers.dev/";

        const toTC = (str) => { if (!str) return ""; return str.replace(/腊/g, "臘").replace(/惊蛰/g, "驚蟄").replace(/時/g, "時").replace(/節/g, "節").replace(/氣/g, "氣"); };

        const GoogleIcon = () => (
            <svg className="w-4 h-4 mr-2" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
        );

        const AnalysisBox = ({ title, content, isDark }) => {
            if (!content) return null;
            return (
                <div className={`p-4 sm:p-6 rounded-2xl border transition-all duration-300 ${isDark ? "bg-slate-900/60 border-slate-700" : "bg-white border-slate-200 shadow-sm"}`}>
                    <p className="text-[12px] font-bold text-emerald-500 uppercase tracking-widest mb-3">{title}</p>
                    <div className="space-y-2 text-xs sm:text-sm leading-relaxed opacity-90 font-medium text-left">
                        {content.split('\n').filter(line => line.trim() !== '').map((line, idx) => (<p key={idx}>{line}</p>))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const CURRENT_REAL_YEAR = new Date().getFullYear();
            const [isDark, setIsDark] = useState(false);
            const [gender, setGender] = useState('male');
            const [threshold, setThreshold] = useState(0);
            const [isDst, setIsDst] = useState(false);

            const [gregYear, setGregYear] = useState(2026);
            const [rocYear, setRocYear] = useState(115);
            const [month, setMonth] = useState(2);
            const [day, setDay] = useState(4);
            const [hour, setHour] = useState(4);
            const [minute, setMinute] = useState(10);

            const [calYear, setCalYear] = useState(new Date().getFullYear());
            const [calMonth, setCalMonth] = useState(new Date().getMonth() + 1);
            const [calendarData, setCalendarData] = useState(null);
            const [isCalLoading, setIsCalLoading] = useState(false);

            const [chartData, setChartData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            const [perms, setPerms] = useState({});  // 預設空物件，避免 ?. 存取 null 造成著色/桃花全掛

            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [adminEmail, setAdminEmail] = useState('');
            const [adminUid, setAdminUid] = useState('');
            const [adminPerms, setAdminPerms] = useState({ colors: true, flowBranchColor: true, romance: false, analysis: false, calendarColors: true });
            const [adminMsg, setAdminMsg] = useState('');
            const [adminSaving, setAdminSaving] = useState(false);
            const [adminFoundUser, setAdminFoundUser] = useState(null);
            const [grantedUsers, setGrantedUsers] = useState([]);
            const [grantedUsersLoading, setGrantedUsersLoading] = useState(false);
            const [editingUid, setEditingUid] = useState(null);

            const baziAbortRef = useRef(null);
            const calAbortRef = useRef(null);
            const baziDebounceRef = useRef(null);   // 防止快速輸入觸發大量請求
            const calDebounceRef = useRef(null);

            const [user, setUser] = useState(null);
            const [profiles, setProfiles] = useState([]);
            const [saveInputName, setSaveInputName] = useState("");

            const isAdmin = useMemo(() => user && user.uid === ADMIN_UID, [user]);
            const isLoggedIn = useMemo(() => !!user, [user]);

            const ELEMENT_STYLES = useMemo(() => ({
                '金': { color: isDark ? 'text-slate-400' : 'text-slate-600', bg: 'bg-slate-400', bar: 'bg-slate-400' },
                '木': { color: isDark ? 'text-emerald-500' : 'text-emerald-700', bg: 'bg-emerald-500', bar: 'bg-emerald-500' },
                '水': { color: isDark ? 'text-blue-500' : 'text-blue-700', bg: 'bg-blue-500', bar: 'bg-blue-500' },
                '火': { color: isDark ? 'text-red-500' : 'text-red-600', bg: 'bg-red-500', bar: 'bg-red-500' },
                '土': { color: isDark ? 'text-[#a57c5a]' : 'text-[#8b4513]', bg: 'bg-[#a57c5a]', bar: 'bg-[#a57c5a]' },
                'none': { color: isDark ? 'text-slate-400' : 'text-slate-950', bg: isDark ? 'bg-slate-800' : 'bg-slate-200' }
            }), [isDark]);

            const RomanceIcon = ({ level, isCompact = false }) => {
                if (!level || !perms?.romance) return null;

                const isHarmony = level > 0;
                const isClash = level < 0;

                let textColor = "";
                let bgColor = "";

                if (isHarmony) {
                    textColor = "text-pink-500";
                    bgColor = "bg-pink-400/25";
                } else {
                    if (Math.abs(level) === 2) {
                        textColor = isDark ? "text-black" : "text-white";
                        bgColor = isDark ? "bg-white" : "bg-black";
                    } else {
                        textColor = isDark ? "text-white" : "text-black";
                        bgColor = "transparent";
                    }
                }

                const containerSize = isCompact ? "w-3 h-3 sm:w-5 sm:h-5" : "w-3.5 h-3.5 sm:w-6 sm:h-6";
                const dotSize = isCompact ? "w-2.5 h-2.5 sm:w-4.5 sm:h-4.5" : "w-3 h-3 sm:w-5 sm:h-5";
                const textSize = isCompact ? "text-[6px] sm:text-[8px]" : "text-[7px] sm:text-[9px]";

                return (
                    <div className={`absolute top-0 right-0 pointer-events-none flex items-center justify-center p-0.5 ${containerSize}`}>
                        {Math.abs(level) === 2 ? (
                            <div className={`${dotSize} rounded-full ${bgColor} flex items-center justify-center`}>
                                <span className={`${textSize} font-black ${textColor} leading-none block text-center transform translate-y-[0.1px]`}>桃</span>
                            </div>
                        ) : (
                            <div className="flex items-center justify-center w-full h-full">
                                <span className={`${textSize} font-black ${textColor} leading-none`}>桃</span>
                            </div>
                        )}
                    </div>
                );
            };

            const hourOptions = useMemo(() => {
                const opts = [{ label: '吉時', val: -1 }];
                for (let i = 0; i < 24; i++) {
                    const branchIdx = Math.floor(((i + 1) % 24) / 2);
                    opts.push({ label: `${i}時 (${BRANCHES[branchIdx]})`, val: i });
                }
                return opts;
            }, []);

            const fetchBazi = useCallback(() => {
                if (!gregYear || !month || !day) return;
                // Debounce 500ms：避免連續改變輸入值時發出大量請求
                if (baziDebounceRef.current) clearTimeout(baziDebounceRef.current);
                baziDebounceRef.current = setTimeout(async () => {
                    if (baziAbortRef.current) baziAbortRef.current.abort();
                    baziAbortRef.current = new AbortController();
                    setIsLoading(true); setError(null);
                    try {
                        const headers = { "Content-Type": "application/json" };
                        if (user) { const token = await user.getIdToken(); headers["Authorization"] = `Bearer ${token}`; }
                        const response = await fetch(WORKER_URL, {
                            method: "POST",
                            headers: headers,
                            body: JSON.stringify({ type: 'bazi', gregYear, month, day, hour, minute, gender, isDst, calYear, calMonth }),
                            signal: baziAbortRef.current.signal
                        });
                        const data = await response.json();
                        if (data.error) throw new Error(data.error);
                        setChartData(data);
                        if (data.perms) setPerms(data.perms);  // 從 Worker 取得最新權限
                        if (data.calendarData) setCalendarData(data.calendarData);
                    } catch (err) { if (err.name !== 'AbortError') setError("運算引擎忙線中，請稍候再試"); }
                    finally { setIsLoading(false); }
                }, 500);
            }, [gregYear, month, day, hour, minute, gender, isDst, user, calYear, calMonth]);

            const fetchCalendar = useCallback(() => {
                // Debounce 400ms：萬年曆查詢也要防多打
                if (calDebounceRef.current) clearTimeout(calDebounceRef.current);
                calDebounceRef.current = setTimeout(async () => {
                    if (calAbortRef.current) calAbortRef.current.abort();
                    calAbortRef.current = new AbortController();
                    setIsCalLoading(true);
                    try {
                        const headers = { "Content-Type": "application/json" };
                        if (user) { const token = await user.getIdToken(); headers["Authorization"] = `Bearer ${token}`; }
                        const response = await fetch(WORKER_URL, {
                            method: "POST",
                            headers: headers,
                            body: JSON.stringify({ type: 'calendar', calYear, calMonth, gregYear, month, day }),
                            signal: calAbortRef.current.signal
                        });
                        const data = await response.json();
                        if (data.calendarData) setCalendarData(data.calendarData);
                        if (data.perms) setPerms(data.perms);
                    } catch (e) { if (e.name !== 'AbortError') console.error("Calendar Failed"); }
                    finally { setIsCalLoading(false); }
                }, 400);
            }, [calYear, calMonth, user, gregYear, month, day]);

            useEffect(() => { fetchBazi(); }, [fetchBazi]);
            useEffect(() => { fetchCalendar(); }, [fetchCalendar]);

            useEffect(() => {
                if (!window.FirebaseSDK) return;
                const { auth, onAuthStateChanged, getRedirectResult, db, doc, setDoc } = window.FirebaseSDK;

                // 處理 Redirect 登入的結果（忽略「無 pending」的正常狀況）
                getRedirectResult(auth)
                    .then(result => { if (result?.user) console.log('Redirect auth ok:', result.user.email); })
                    .catch(e => { if (e?.code !== 'auth/no-current-user') console.error('Redirect auth error:', e?.code); });

                const unsubscribe = onAuthStateChanged(auth, async (u) => { 
                    if (u && !u.isAnonymous) {
                        setUser(u);
                        // 自動寫入 Firestore user_registry，讓管理員可透過 Email 找到此用戶
                        try {
                            await setDoc(doc(db, 'user_registry', u.email.toLowerCase()), { 
                                uid: u.uid, email: u.email, name: u.displayName, updatedAt: Date.now()
                            }, { merge: true });
                        } catch(e) { console.error('Reg Error:', e?.code); }
                    } else {
                        setUser(null);
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !window.FirebaseSDK) { setProfiles([]); return; }
                const { db, collection, onSnapshot, query, limit } = window.FirebaseSDK;
                const unsubscribe = onSnapshot(query(collection(db, 'artifacts', 'luminous-path-pro', 'users', user.uid, 'profiles')), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => (a.order ?? 999) - (b.order ?? 999) || new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
                    setProfiles(data);
                });
                return () => unsubscribe();
            }, [user]);

            const StarLabel = ({ starInfo, isDayMaster = false, isVertical = false, extraSmall = false, isFortune = false }) => {
                if (!starInfo) return null;
                const { name, element, color } = starInfo;
                const freq = (chartData && chartData.pillars) ? chartData.pillars.reduce((acc, p, i) => {
                    if (i !== 2 && p.main?.name === name) acc++;
                    p.sub?.forEach(s => { if (s.star?.name === name) acc++; });
                    return acc;
                }, 0) : 0;
                const isStrong = isFortune ? true : (threshold > 0 && !isDayMaster && freq >= threshold);
                const style = ELEMENT_STYLES[color || "none"] || ELEMENT_STYLES["none"];
                const baseStyles = "rounded border font-bold flex items-center justify-center transition-all duration-300 overflow-hidden text-center mx-auto";
                let colorStyles = (color === "none" || !color) ? (isDark ? "bg-slate-800 text-slate-400 border-slate-700" : "bg-white border-slate-300 text-slate-950") : (isDayMaster ? "bg-yellow-500 text-slate-950 border-yellow-600 shadow-md" : (isStrong ? `${style.bg} text-white border-transparent shadow-lg ring-1 ring-white/10` : (isDark ? "bg-slate-800 text-slate-200 border-slate-700 shadow-inner" : "bg-slate-100 text-slate-700 border-slate-200 shadow-sm")));
                const paddingStyles = isVertical ? "px-0.5 py-1 sm:px-1.5 sm:py-2 min-h-[4.5rem]" : "px-1.5 py-0.5 sm:px-3 sm:py-1";
                const fontStyles = isVertical ? `${extraSmall ? 'text-[9.5px]' : 'text-[11px]'} sm:text-sm leading-tight` : "text-[clamp(0.75rem,2.8vw,1.1rem)] leading-none";
                return <div className={`${baseStyles} ${colorStyles} ${paddingStyles} ${fontStyles}`} style={isVertical ? { writingMode: 'vertical-rl' } : {}}>{name}</div>;
            };

            const CharacterWithElement = ({ char, element, color, isSmall = false, isYueling = false }) => {
                if (!char) return null;
                const style = ELEMENT_STYLES[color || "none"] || ELEMENT_STYLES["none"];
                const charSize = isSmall ? "text-lg" : "text-[clamp(1.5rem,7vw,3.2rem)]";

                if (isYueling) {
                    return (
                        <div className="relative inline-flex items-center justify-center text-center font-serif transition-all duration-500">
                             <div className={`w-7 h-7 sm:w-8 sm:h-8 rounded-full flex items-center justify-center shadow-sm ${style.bg} text-white`}>
                                <span className={`${charSize} leading-none`}>{char}</span>
                             </div>
                             {element && element !== "none" && <span className="text-[clamp(0.45rem,1.5vw,0.65rem)] ml-px opacity-80 font-sans font-bold leading-none">{element}</span>}
                        </div>
                    );
                }

                return (
                    <div className="relative inline-flex items-center justify-center text-center font-serif transition-colors duration-500">
                        <span className={`${charSize} leading-none tracking-tight ${style.color}`}>{char}</span>
                        {element && element !== "none" && <span className="text-[clamp(0.45rem,1.5vw,0.65rem)] ml-px opacity-80 font-sans font-bold leading-none">{element}</span>}
                    </div>
                );
            };

            const handleLoadCase = () => { setGregYear(1977); setRocYear(66); setMonth(1); setDay(24); setHour(9); setMinute(0); setIsDst(false); };
            const handleClear = () => { setGregYear(""); setRocYear(""); setMonth(1); setDay(""); setHour(-1); setMinute(0); setIsDst(false); setChartData(null); };


            // --- Admin Panel: 載入已授權用戶列表 ---
            const loadGrantedUsers = useCallback(async () => {
                if (!user) return;
                setGrantedUsersLoading(true);
                try {
                    const token = await user.getIdToken();
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ type: 'listPermissions' })
                    });
                    const data = await res.json();
                    setGrantedUsers(data.users || []);
                } catch (e) { console.error('loadGrantedUsers failed', e); }
                finally { setGrantedUsersLoading(false); }
            }, [user]);

            useEffect(() => { if (showAdminPanel && isAdmin) loadGrantedUsers(); }, [showAdminPanel, isAdmin, loadGrantedUsers]);

            // --- Admin Panel: Email 查詢（KV → Firestore 雙重 fallback）---
            const DEFAULT_PERMS = { colors: true, flowBranchColor: true, romance: false, analysis: false, calendarColors: true };
            const handleFetchAdminPerms = useCallback(async () => {
                if (!adminEmail.trim() || !user) return;
                const email = adminEmail.trim().toLowerCase();
                setAdminMsg('查詢中...');
                setAdminFoundUser(null);
                setAdminUid('');
                try {
                    const token = await user.getIdToken();
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ type: 'getPermissions', targetEmail: email })
                    });

                    if (res.status === 404) {
                        // KV 無索引 → Fallback：從 Firestore user_registry 查找
                        setAdminMsg('KV 無索引，查詢登入紀錄...');
                        try {
                            const { db, doc, getDoc } = window.FirebaseSDK;
                            const snap = await getDoc(doc(db, 'user_registry', email));
                            if (snap.exists()) {
                                const d = snap.data();
                                setAdminUid(d.uid);
                                setAdminFoundUser({ uid: d.uid, email: d.email, name: d.name });
                                setAdminPerms({ ...DEFAULT_PERMS });
                                setAdminMsg('✅ 已找到用戶（套用預設值，儲存後建立索引）');
                            } else {
                                setAdminMsg('❌ 查無此 Email（對方需先到網站登入一次）');
                            }
                        } catch (fe) { setAdminMsg('❌ 查詢失敗'); }
                        return;
                    }

                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    setAdminUid(data.uid);
                    setAdminFoundUser(data.userInfo || { uid: data.uid, email: email });
                    setAdminPerms(data.perms);
                    setAdminMsg('✅ 已讀取');
                } catch (e) { setAdminMsg('❌ 查詢失敗: ' + e.message); }
            }, [adminEmail, user]);

            // --- Admin Panel: 儲存權限，同時傳 userInfo 給 Worker 建立 KV 索引 ---
            const handleSaveAdminPerms = useCallback(async () => {
                if (!adminUid || !user) { setAdminMsg('❌ 請先搜尋用戶'); return; }
                setAdminSaving(true); setAdminMsg('');
                try {
                    const token = await user.getIdToken();
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ type: 'setPermissions', targetUid: adminUid, permissions: adminPerms, userInfo: adminFoundUser })
                    });
                    const data = await res.json();
                    if (data.ok) { setAdminMsg('✅ 已成功儲存'); loadGrantedUsers(); }
                    else setAdminMsg(`❌ 錯誤: ${data.error}`);
                } catch (e) { setAdminMsg('❌ 儲存失敗'); }
                finally { setAdminSaving(false); }
            }, [adminUid, adminPerms, adminFoundUser, user, loadGrantedUsers]);

            // --- Admin Panel: 列表內行 Toggle（樂觀更新 + 立即儲存）---
            const handleInlineToggle = useCallback(async (targetUser, permKey, newVal) => {
                const newPerms = { ...targetUser.perms, [permKey]: newVal };
                const info = { uid: targetUser.uid, email: targetUser.email, name: targetUser.name };

                                                await signInWithPopup(auth, provider);

                                            }

                                );
                            })}
                        </div>

                        <div className="flex flex-wrap items-center gap-3 py-1 overflow-x-auto no-scrollbar text-center">
                            <div className="flex items-center gap-2 mx-auto sm:mx-0">
                                <span className="text-[10px] sm:text-xs font-bold uppercase text-slate-500 whitespace-nowrap">十神標記:</span>
                                <div className="flex gap-1.5">
                                    {[0, 2, 3, 4, 5, 6].map(n => (
                                        <button key={n} onClick={() => setThreshold(n)} className={`w-8 h-8 sm:w-10 sm:h-10 rounded-lg border text-[10px] sm:text-sm font-bold transition-all flex items-center justify-center shrink-0 ${threshold === n ? 'bg-emerald-600 border-emerald-500 text-white shadow-lg' : isDark ? 'bg-slate-800 border-slate-700 text-slate-400' : 'bg-white border-slate-200 text-slate-500 shadow-sm'}`}>{n || 'OFF'}</button>
                                    ))}
                                </div>
                            </div>
                            {!isLoggedIn && <span className="text-[9px] font-bold text-slate-950 dark:text-slate-400 italic">登入解鎖更多功能</span>}
                        </div>

                        {perms?.analysis && <AnalysisBox title="六十甲子" content={chartData?.dayPillarAnalysis} isDark={isDark} />}

                        <div className="divider-gradient my-2 opacity-30"></div>

                        {chartData && chartData.timing && (
                            <div className={`p-4 sm:p-6 rounded-2xl border ${isDark ? "bg-slate-900/60 border-slate-700" : "bg-white border-slate-200 shadow-sm"} text-left`}>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <p className="text-[12px] font-bold text-emerald-500 uppercase tracking-widest">出生節氣資訊</p>
                                        <p className="text-xs sm:text-sm font-bold opacity-90">農曆：<span className="text-emerald-600 dark:text-emerald-400">{toTC(chartData.timing.lunarStr)}</span></p>
                                        <p className="text-[11px] sm:text-xs text-slate-500">
                                            {toTC(chartData.timing.prevNodeName)}後 {chartData.timing.prevD}天 | {toTC(chartData.timing.nextNodeName)}前 {chartData.timing.nextD}天
                                        </p>
                                    </div>
                                    <div className="space-y-1">
                                        <p className="text-[12px] font-bold text-blue-500 uppercase tracking-widest">起運資訊</p>
                                        <p className="text-xs sm:text-sm font-bold">約為 <span className="text-blue-500">{chartData.timing.startDate}</span></p>
                                        <p className="text-[11px] font-bold opacity-60 text-blue-600">出生後 {chartData.timing.startAge.y}歲 {chartData.timing.startAge.m || 0}個月 {chartData.timing.startAge.d || 0}天 起大運</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {chartData && chartData.fortunePillars && (
                            <React.Fragment>
                                <div className={`rounded-2xl border ${isDark ? "border-slate-700 shadow-2xl" : "border-slate-800/50 shadow-xl"} overflow-hidden overflow-x-auto no-scrollbar`}><table className="fortune-table"><thead className={isDark ? "bg-slate-900 border-b border-slate-700" : "bg-white"}><tr className="text-slate-400 font-bold uppercase tracking-widest text-[9px] sm:text-[10px]"><th className={`w-[11%] text-center ${isDark ? "bg-slate-900" : "bg-white"}`}>項目</th>{chartData.fortunePillars.map((p, i) => <th key={i} className={`border-l ${isDark ? "border-slate-700" : "border-slate-800/30"} text-center`}>{p.label}</th>)}</tr></thead><tbody className={isDark ? "bg-slate-900/20" : "bg-white"}><tr><td className={`font-bold text-slate-500 text-[9px] sm:text-xs text-center ${isDark ? "bg-slate-900/50" : "bg-slate-100"}`}>十神</td>{chartData.fortunePillars.map((p, i) => <td key={i} className={`px-px text-center border-l ${isDark ? "border-slate-700/30" : "border-slate-800/10"}`}>{p.label === '童限' ? null : <StarLabel starInfo={p.tenGod} isFortune extraSmall />}</td>)}</tr><tr><td className={`font-bold text-slate-500 text-[9px] sm:text-xs text-center ${isDark ? "bg-slate-900/50" : "bg-slate-100"}`}>運程</td>{chartData.fortunePillars.map((p, i) => (<td key={i} className={`text-center border-l ${isDark ? "border-slate-700/30" : "border-slate-800/10"}`}>{p.stem ? (<div className="flex flex-col items-center justify-center text-center"><div className="flex gap-px items-center justify-center leading-none font-serif font-bold text-[11px] sm:text-lg"><span className={ELEMENT_STYLES[p.stemColor || "none"].color}>{p.stem}</span><span className={ELEMENT_STYLES[p.branchColor || "none"].color}>{p.branch}</span></div></div>) : <span className="opacity-20 text-[10px]">－</span>}</td>))}</tr><tr><td className={`font-bold text-slate-500 text-[9px] sm:text-xs text-center border-b-2 ${isDark ? "bg-slate-900/50 border-slate-700" : "bg-white border-slate-800/50"}`}>周歲</td>{chartData.fortunePillars.map((p, i) => <td key={i} className={`text-blue-400 font-bold text-[9px] sm:text-xs border-b-2 text-center border-l ${isDark ? "border-slate-800/50" : "border-slate-800/50"}`}>{p.age}</td>)}</tr><tr><td className={`text-slate-700 font-bold text-[9px] sm:text-xs uppercase text-center ${isDark ? "bg-slate-900/50" : "bg-slate-100"}`}>流年</td>{chartData.fortunePillars.map((p, pIdx) => { const startOffset = 10 - p.flowYears.length; return (<td key={pIdx} className={`p-0 align-top border-l ${isDark ? "border-slate-700/30" : "border-slate-800/10"}`}><div className="flex flex-col">{[...Array(10)].map((_, rowIndex) => { const dataIdx = rowIndex - startOffset; const fy = (dataIdx >= 0) ? p.flowYears[dataIdx] : null; if (!fy) return <div key={rowIndex} className="flow-year-row"></div>; return (<div key={rowIndex} className={`flow-year-row ${rowIndex === 4 ? (isDark ? 'border-b-2 border-slate-600/50' : 'border-b-2 border-slate-400/50') : 'border-b border-slate-800/10'} last:border-0 ${fy.year === CURRENT_REAL_YEAR ? 'highlight-year' : ''}`}><div className="flex items-center gap-px font-serif leading-none font-bold text-[10px] sm:text-[13px] text-center justify-center"><span className={ELEMENT_STYLES[fy.stemColor || "none"].color}>{fy.stem}</span><span className={perms?.flowBranchColor ? "" : (isDark ? 'text-slate-400' : 'text-slate-950')}>{fy.branch}</span></div><RomanceIcon level={fy.romance} isCompact /></div>); })}</div></td>); })}</tr></tbody></table></div>
                                {perms?.analysis && <div className="mt-4"><AnalysisBox title="流年點評" content={chartData?.flowYearAnalysis} isDark={isDark} /></div>}
                            </React.Fragment>
                        )}

                        <div className={`p-4 sm:p-6 rounded-2xl border transition-all duration-300 ${isDark ? 'bg-slate-900/40 border-slate-800 shadow-2xl' : 'bg-white border-slate-200 shadow-xl'}`}>
                            <div className="flex flex-row items-center justify-between gap-1 mb-6 sm:mb-8 text-left">
                                <div className="flex items-center gap-1 sm:gap-3 shrink-0">
                                    <div className="w-1 h-5 sm:w-1.5 sm:h-6 bg-blue-500 rounded-full"></div>
                                    <h2 className="font-black text-sm sm:text-xl tracking-tighter sm:tracking-widest uppercase">流月流日</h2>
                                </div>
                                <div className="flex items-center gap-1.5 sm:gap-3 shrink-0">
                                    <div className="flex flex-col gap-0.5 sm:gap-1">
                                        <span className="text-[6px] sm:text-[8px] font-bold opacity-40 uppercase">查詢西元</span>
                                        <input type="number" value={calYear} onChange={(e) => setCalYear(parseInt(e.target.value) || new Date().getFullYear())} className={`rounded px-1 py-0.5 text-[10px] sm:text-xs border h-7 sm:h-9 appearance-none w-14 sm:w-24 max-w-[65px] sm:max-w-none ${isDark ? "bg-slate-950 border-slate-800 text-slate-100" : "bg-white border-slate-200"}`} />
                                    </div>
                                    <div className="flex flex-col gap-0.5 sm:gap-1">
                                        <span className="text-[6px] sm:text-[8px] font-bold opacity-40 uppercase">查詢月份</span>
                                        <select value={calMonth} onChange={(e) => setCalMonth(parseInt(e.target.value) || 1)} className={`rounded px-1 py-0.5 text-[10px] sm:text-xs border h-7 sm:h-9 appearance-none w-14 sm:w-24 max-w-[65px] sm:max-w-none ${isDark ? "bg-slate-950 border-slate-800 text-slate-100" : "bg-white border-slate-200"}`}>{Array.from({ length: 12 }, (_, i) => <option key={i + 1} value={i + 1}>{i + 1}月</option>)}</select>
                                    </div>
                                </div>
                            </div>

                            <div className="mb-8 w-full overflow-hidden">
                                <table className="w-full table-fixed border-collapse border border-slate-700/30">
                                    <thead><tr className={isDark ? "bg-slate-800/50" : "bg-slate-100/50"}><th className="p-0.5 border border-slate-700/30 text-[7px] sm:text-xs font-bold w-[13%] sm:w-20">月份</th>{Array.from({ length: 12 }, (_, i) => <th key={i} className="p-0.5 border border-slate-700/30 text-[7px] sm:text-xs font-bold">{i + 1}</th>)}</tr></thead>
                                    <tbody>
                                        <tr>
                                            <td className="p-0.5 border border-slate-700/30 text-[7px] sm:text-xs font-bold text-center">流月</td>
                                            {calendarData?.flowMonths?.map((m, i) => (
                                                <td key={i} className="p-0 border border-slate-700/30 font-serif font-bold text-center relative h-10 sm:h-12 overflow-hidden text-center">
                                                    <div className="flex flex-row items-center justify-center gap-0 text-[clamp(8px,2.1vw,14px)] sm:text-base leading-none w-full h-full">
                                                        <span className={ELEMENT_STYLES[perms?.calendarColors ? m.stemColor : "none"].color}>{m.stem}</span>
                                                        <span className={isDark ? "text-slate-400" : "text-slate-600"}>{m.branch}</span>
                                                    </div>
                                                    <RomanceIcon level={m.romance} isCompact />
                                                </td>
                                            )) || Array.from({ length: 12 }, (_, i) => <td key={i} className="p-1 border border-slate-700/30 opacity-20 text-center text-[7px]">...</td>)}
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            {isCalLoading && <div className="h-1 loading-shimmer w-full rounded-full mb-4"></div>}

                            {/* 流日萬年曆優化：日期靠左 + 桃花靠右，格子內容自適應縮放 */}
                            <div className="grid grid-cols-7 gap-1 sm:gap-2">
                                {['一', '二', '三', '四', '五', '六', '日'].map(w => (<div key={w} className="text-center text-[8px] sm:text-[10px] font-black opacity-40 pb-1.5 border-b border-slate-700/20 mb-1.5">週{w}</div>))}
                                {calendarData?.days ? (
                                    <React.Fragment>
                                        {Array.from({ length: calendarData.days[0].weekday }).map((_, i) => (<div key={`empty-${i}`} className="h-12 sm:h-16 opacity-0"></div>))}
                                        {calendarData.days.map((d, idx) => (
                                            <div key={idx} className={`p-0.5 sm:p-2 rounded-lg border flex flex-col transition-all relative h-12 sm:h-auto ${d.day === new Date().getDate() && calMonth === (new Date().getMonth() + 1) && calYear === new Date().getFullYear() ? 'ring-1.5 ring-blue-500 bg-blue-500/5 shadow-inner' : isDark ? 'bg-slate-950 border-slate-800 shadow-sm' : 'bg-white border-slate-200 shadow-sm'}`}>
                                                <div className="flex justify-between items-start w-full h-2.5 sm:h-5">
                                                    <div className="text-[7px] sm:text-[10px] font-black opacity-30 leading-none pl-0.5">{d.day}</div>
                                                    <div className="relative w-3 h-3 sm:w-5 sm:h-5">
                                                        <RomanceIcon level={d.romance} isCompact />
                                                    </div>
                                                </div>
                                                <div className="flex items-center justify-center gap-0 font-serif font-bold text-[clamp(10px,4.5vw,14px)] sm:text-[14px] leading-none mt-1 sm:mt-1.5">
                                                    <span className={ELEMENT_STYLES[perms?.calendarColors ? d.stemColor : "none"].color}>{d.stem}</span>
                                                    <span className={isDark ? "text-slate-300" : "text-slate-700"}>{d.branch}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </React.Fragment>
                                ) : <div className="col-span-full py-10 opacity-30 italic text-[10px]">正在載入數據...</div>}
                            </div>
                        </div>

                        <div className="mt-10 mb-6 pb-6 border-slate-200 dark:border-slate-800 text-center"><p className="text-[clamp(11.5px,2.8vw,16px)] leading-relaxed md:leading-loose opacity-70 font-medium max-w-[50rem] md:max-w-[85ch] mx-auto font-serif italic tracking-wide">“命理不是預言未來的水晶球，而是一份解碼你的「出廠設定」說明書。命盤揭示的是每個人獨一無二的原始劇本。學命理，是學會閱讀自己，用理解取代迷信。理解命的邏輯，就能在敬畏中找到自信，讓命運掌握在自己手裡。”</p></div>
                    </div>

                    <footer className={`py-8 sm:py-16 border-t mt-auto transition-colors duration-300 ${isDark ? 'bg-slate-950 border-slate-800 text-slate-400' : 'bg-white border-slate-200 text-slate-500'}`}>
                        <div className="max-w-[1200px] mx-auto px-4 sm:px-8 text-center sm:text-left">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-6 text-left">
                                <div className="flex flex-row items-center justify-between md:justify-start gap-4 sm:gap-10 w-full md:w-auto">
                                    <div className="flex flex-col"><span className="text-[10px] uppercase font-black tracking-widest opacity-60 leading-tight">Created by</span><span className="text-xs sm:text-sm font-bold tracking-tight">kasimchang</span></div>
                                    <div className="h-8 w-px bg-slate-200 dark:bg-slate-800 hidden md:block"></div>
                                    <a href="https://www.msf.org.tw/" target="_blank" className="group flex flex-row items-center gap-2"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/b/b9/M%C3%A9decins_Sans_Fronti%C3%A8res_%28logo%29.svg/500px-M%C3%A9decins_Sans_Fronti%C3%A8res_%28logo%29.svg.png" alt="MSF" className="h-7 sm:h-10 w-auto object-contain" onError={(e) => e.target.style.display = 'none'} /><span className="text-[9px] uppercase font-black text-red-500/80 leading-none whitespace-nowrap">捐款支持做好事</span></a>
                                    <div className="h-8 w-px bg-slate-200 dark:bg-slate-800 hidden md:block"></div>
                                    <div className="flex flex-col">
                                        <span className="text-[10px] uppercase font-black tracking-widest opacity-60 leading-tight">Copyright</span>
                                        <span className="text-xs sm:text-sm font-bold tracking-tight italic whitespace-nowrap">© 2026 LuminousPath</span>
                                    </div>
                                </div>
                                <div className="flex flex-col items-center md:items-end text-center md:text-right w-full md:w-auto mt-2 md:mt-0">
                                    <span className="text-[10px] uppercase font-black tracking-[0.3em] text-emerald-500 mb-1 leading-none">LuminousPath Pro</span>
                                    <p className="text-[11px] font-medium opacity-60">東方命理結構分析引擎</p>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>

</html>
