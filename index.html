<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>四柱八字 - LuminousPath Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, query, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCf5q4CJehSCnml8w_sOC27igtNt637Th4",
            authDomain: "fir-console-86c87.firebaseapp.com",
            projectId: "fir-console-86c87",
            storageBucket: "fir-console-86c87.firebasestorage.app",
            messagingSenderId: "1074159437762",
            appId: "1:1074159437762:web:d6f9a3f81ebeed2ebe785b",
            measurementId: "G-3LB4W975PE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.FirebaseSDK = {
            app, auth, db,
            firebaseConfig, initializeApp, getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut,
            getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, query, limit,
            signInWithCustomToken, signInAnonymously, getRedirectResult, signInWithRedirect
        };
    </script>
    <link rel="stylesheet" href="index.css">
</head>

<body class="flex flex-col min-h-screen transition-colors duration-300 text-center">
    <div id="root" class="flex-grow flex flex-col text-center"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback, useRef } = React;

        const ADMIN_UID = "H5dBIA0UxyYo8oV5GZ442u5yZ733";
        const BRANCHES = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const WORKER_URL = "https://luminouspath.l321815.workers.dev/";

        const toTC = (str) => { if (!str) return ""; return str.replace(/腊/g, "臘").replace(/惊蛰/g, "驚蟄").replace(/時/g, "時").replace(/節/g, "節").replace(/氣/g, "氣"); };

        const GoogleIcon = () => (
            <svg className="w-4 h-4 mr-2" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
        );

        const AnalysisBox = ({ title, content, isDark }) => {
            if (!content) return null;
            return (
                <div className={`p-4 sm:p-6 rounded-2xl border transition-all duration-300 ${isDark ? "bg-slate-900/60 border-slate-700" : "bg-white border-slate-200 shadow-sm"}`}>
                    <p className="text-[12px] font-bold text-emerald-500 uppercase tracking-widest mb-3">{title}</p>
                    <div className="space-y-2 text-xs sm:text-sm leading-relaxed opacity-90 font-medium text-left">
                        {content.split('\n').filter(line => line.trim() !== '').map((line, idx) => (<p key={idx}>{line}</p>))}
                    </div>
                </div>
            );
        };

        // ============================================================
        // 元件：流年點評手風琴 (FlowYearAccordion)
        // 分頁：流年總評 / 財運 / 事業 / 桃花 / 健康 / 避凶
        // ============================================================
        const FlowYearAccordion = ({ chartData, isDark, perms }) => {
            const [activeTab, setActiveTab] = React.useState('流年');
            if (!perms?.analysis) return null;

            /** 各分頁配置： label / content */
            const tabs = [
                { key: '流年', label: '流年總評', content: chartData?.flowYearAnalysis },
                { key: '財運', label: '財運', content: chartData?.flowYearCategories?.['財運'] },
                { key: '事業', label: '事業', content: chartData?.flowYearCategories?.['事業'] },
                { key: '桃花', label: '桃花', content: chartData?.flowYearCategories?.['桃花'] },
                { key: '健康', label: '健康', content: chartData?.flowYearCategories?.['健康'] },
                { key: '避凶', label: '避凶', content: chartData?.flowYearCategories?.['避凶'] },
            ];
            const active = tabs.find(t => t.key === activeTab);

            return (
                <div className={`rounded-2xl border overflow-hidden shadow-sm ${isDark ? 'border-slate-700/50 bg-slate-900/60' : 'border-slate-200 bg-white'}`}>
                    {/* 頁籤標題列 */}
                    <div className={`flex overflow-x-auto no-scrollbar border-b ${isDark ? 'border-slate-700/50 bg-slate-900/80' : 'border-slate-200 bg-slate-50'}`}>
                        {tabs.map(tab => (
                            <button
                                key={tab.key}
                                onClick={() => setActiveTab(tab.key)}
                                className={`flex items-center gap-1.5 px-4 sm:px-6 py-4 text-sm sm:text-lg font-bold whitespace-nowrap transition-all border-b-2 -mb-px tracking-wider
                                    ${activeTab === tab.key
                                        ? 'border-emerald-500 text-emerald-500'
                                        : (isDark ? 'border-transparent text-slate-500 hover:text-slate-300 hover:border-slate-600' : 'border-transparent text-slate-400 hover:text-slate-600 hover:border-slate-300')}`}
                            >
                                <span>{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* 內容區 */}
                    <div className="p-5 sm:p-7 min-h-[100px]">
                        {active?.content ? (
                            <div className="space-y-3 text-[12px] sm:text-[14px] leading-7 sm:leading-8 font-medium text-left tracking-wide opacity-95">
                                {active.content.split('\n').filter(l => l.trim()).map((line, i) => <p key={i}>{line}</p>)}
                            </div>
                        ) : (
                            <div className="flex flex-col items-center justify-center py-10 opacity-30 italic">
                                <p className="text-sm">暫無{active?.label}分析資料</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================================
        const AdminPanelModal = ({
            isDark, showAdminPanel, isAdmin, setShowAdminPanel,
            adminSearchMode, setAdminSearchMode,
            adminEmail, setAdminEmail, adminUidInput, setAdminUidInput,
            adminMsg, setAdminMsg, adminFoundUser,
            adminPerms, setAdminPerms, adminSaving,
            grantedUsers, grantedUsersLoading,
            editingUid, setEditingUid,
            handleFetchAdminPerms, handleFetchByUid,
            handleSaveAdminPerms, handleInlineToggle, loadGrantedUsers
        }) => {
            if (!showAdminPanel || !isAdmin) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-start justify-center p-3 sm:p-6 overflow-y-auto" onClick={() => setShowAdminPanel(false)}>
                    <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" />
                    <div className={`relative z-10 w-full max-w-xl rounded-2xl border shadow-2xl my-6 ${isDark ? 'bg-slate-900 border-slate-700 text-slate-100' : 'bg-white border-slate-200 text-slate-900'}`} onClick={e => e.stopPropagation()}>
                        <div className={`flex items-center justify-between px-5 pt-4 pb-3 border-b ${isDark ? 'border-slate-700' : 'border-slate-200'}`}>
                            <div><p className="text-[10px] font-black uppercase tracking-widest text-emerald-500">Admin Panel</p><h3 className="text-base font-black tracking-tight">用戶權限管理</h3></div>
                            <button onClick={() => setShowAdminPanel(false)} className="p-1.5 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 transition-all">✕</button>
                        </div>
                        <div className="p-4 space-y-4">
                            {/* 區域一：搜尋授權 */}
                            <div className={`rounded-xl border p-4 space-y-3 ${isDark ? 'border-slate-700 bg-slate-800/30' : 'border-slate-200 bg-slate-50'}`}>
                                <div className="flex items-center justify-between">
                                    <p className="text-[10px] font-black uppercase tracking-widest opacity-40">新增 / 搜尋現有授權</p>
                                    <div className="flex gap-1">
                                        {['email', 'uid'].map(m => (
                                            <button key={m} onClick={() => { setAdminSearchMode(m); setAdminMsg(''); }} className={`text-[9px] font-black px-2 py-0.5 rounded-md transition-all uppercase ${adminSearchMode === m ? 'bg-emerald-500 text-white' : isDark ? 'bg-slate-700 text-slate-400' : 'bg-slate-200 text-slate-500'}`}>{m}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    {adminSearchMode === 'email' ? (
                                        <input type="email" value={adminEmail} onChange={e => { setAdminEmail(e.target.value); setAdminMsg(''); }} onKeyDown={e => e.key === 'Enter' && handleFetchAdminPerms()} placeholder="輸入對象的 Gmail 帳號..." className={`flex-1 rounded-lg px-3 py-2 text-xs border outline-none focus:ring-1 focus:ring-emerald-500 ${isDark ? 'bg-slate-800 border-slate-700 text-slate-100 placeholder:text-slate-600' : 'bg-white border-slate-200'}`} />
                                    ) : (
                                        <input type="text" value={adminUidInput} onChange={e => { setAdminUidInput(e.target.value); setAdminMsg(''); }} onKeyDown={e => e.key === 'Enter' && handleFetchByUid()} placeholder="直接貼上 UID..." className={`flex-1 rounded-lg px-3 py-2 text-xs border font-mono outline-none focus:ring-1 focus:ring-emerald-500 ${isDark ? 'bg-slate-800 border-slate-700 text-slate-100 placeholder:text-slate-600' : 'bg-white border-slate-200'}`} />
                                    )}
                                    <button onClick={adminSearchMode === 'email' ? handleFetchAdminPerms : handleFetchByUid} className="px-3 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold transition-all whitespace-nowrap">搜尋</button>
                                </div>
                                {adminMsg && <p className={`text-[11px] font-bold px-3 py-2 rounded-lg ${adminMsg.startsWith('✅') ? 'bg-emerald-500/10 text-emerald-600' : adminMsg.startsWith('⚠️') ? 'bg-yellow-500/10 text-yellow-600' : 'bg-red-500/10 text-red-500'}`}>{adminMsg}</p>}
                                {adminFoundUser && (
                                    <div className={`rounded-lg border p-3 space-y-3 ${isDark ? 'border-slate-600 bg-slate-800' : 'border-slate-200 bg-white'}`}>
                                        <div className="flex items-center gap-2">
                                            <div className="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-white text-sm font-black shrink-0">{(adminFoundUser.name || adminFoundUser.email || '?')[0].toUpperCase()}</div>
                                            <div className="flex flex-col leading-tight"><span className="text-xs font-bold">{adminFoundUser.name || '未知姓名'}</span><span className="text-[10px] opacity-40">{adminFoundUser.email}</span></div>
                                        </div>
                                        <div className="grid grid-cols-1 gap-2">
                                            {[['colors', '四柱/大運著色'], ['flowBranchColor', '流年地支著色'], ['calendarColors', '萬年曆著色'], ['romance', '桃花感應標記'], ['wealth', '財旺感應標記'], ['travelingHorse', '驛馬感應標記'], ['analysis', '命盤文字分析']].map(([key, label]) => (
                                                <label key={key} className="flex items-center justify-between cursor-pointer">
                                                    <span className="text-xs font-medium">{label}</span>
                                                    <div className="relative" onClick={() => setAdminPerms(p => ({ ...p, [key]: !p[key] }))}>
                                                        <div className={`w-9 h-5 rounded-full transition-colors ${adminPerms[key] ? 'bg-emerald-500' : isDark ? 'bg-slate-700' : 'bg-slate-300'}`}><div className={`absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform ${adminPerms[key] ? 'translate-x-4' : 'translate-x-0.5'}`} /></div>
                                                    </div>
                                                </label>
                                            ))}
                                        </div>
                                        <button onClick={handleSaveAdminPerms} disabled={adminSaving} className="w-full py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 text-white text-xs font-black transition-all">{adminSaving ? '儲存中...' : '✓ 儲存權限'}</button>
                                    </div>
                                )}
                            </div>
                            {/* 區域二：已授權用戶列表 */}
                            <div className="space-y-2">
                                <div className="flex items-center justify-between px-1">
                                    <p className="text-[10px] font-black uppercase tracking-widest opacity-40">已特別授權 ({grantedUsers.length} 人)</p>
                                    <button onClick={loadGrantedUsers} disabled={grantedUsersLoading} className="text-[10px] font-bold text-emerald-500 hover:text-emerald-400 transition-all disabled:opacity-40">{grantedUsersLoading ? '載入中...' : '↻ 重新整理'}</button>
                                </div>
                                {grantedUsers.length === 0 && !grantedUsersLoading && (<p className="text-[11px] opacity-25 text-center py-6 italic">尚無任何已授權用戶</p>)}
                                <div className="space-y-2 max-h-64 overflow-y-auto no-scrollbar">
                                    {grantedUsers.map(u => (
                                        <div key={u.uid} className={`rounded-xl border p-3 transition-all ${isDark ? 'border-slate-700 bg-slate-800/40' : 'border-slate-200 bg-slate-50'}`}>
                                            <div className="flex items-center justify-between gap-2">
                                                <div className="flex items-center gap-2 min-w-0">
                                                    <div className="w-6 h-6 rounded-full bg-blue-500/20 text-blue-500 flex items-center justify-center text-[10px] font-black shrink-0">{(u.name || u.email || u.uid)[0].toUpperCase()}</div>
                                                    <div className="flex flex-col leading-tight min-w-0"><span className="text-[11px] font-bold truncate">{u.name || '未知'}</span><span className="text-[9px] opacity-40 truncate">{u.email || u.uid}</span></div>
                                                </div>
                                                <button onClick={() => setEditingUid(editingUid === u.uid ? null : u.uid)} className={`text-[10px] font-bold px-2 py-1 rounded-md transition-all shrink-0 ${editingUid === u.uid ? 'bg-emerald-500 text-white' : isDark ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>{editingUid === u.uid ? '收起 ▲' : '編輯 ▼'}</button>
                                            </div>
                                            {editingUid !== u.uid && (<div className="flex flex-wrap gap-1 mt-2">{[['colors', '著色'], ['flowBranchColor', '流年色'], ['calendarColors', '曆色'], ['romance', '桃花'], ['wealth', '財旺'], ['travelingHorse', '驛馬'], ['analysis', '分析']].map(([k, lbl]) => (<span key={k} className={`text-[8px] font-bold px-1.5 py-0.5 rounded-full ${u.perms?.[k] ? 'bg-emerald-500/15 text-emerald-600 dark:text-emerald-400' : isDark ? 'bg-slate-700 text-slate-600' : 'bg-slate-200 text-slate-400'}`}>{lbl}</span>))}</div>)}
                                            {editingUid === u.uid && (<div className={`mt-3 pt-3 border-t grid grid-cols-1 gap-2 ${isDark ? 'border-slate-700' : 'border-slate-200'}`}>{[['colors', '四柱/大運著色'], ['flowBranchColor', '流年地支著色'], ['calendarColors', '萬年曆著色'], ['romance', '桃花感應標記'], ['wealth', '財旺感應標記'], ['travelingHorse', '驛馬感應標記'], ['analysis', '命盤文字分析']].map(([k, lbl]) => (<label key={k} className="flex items-center justify-between cursor-pointer"><span className="text-[11px] font-medium">{lbl}</span><div className="relative" onClick={() => handleInlineToggle(u, k, !u.perms?.[k])}><div className={`w-9 h-5 rounded-full transition-colors ${u.perms?.[k] ? 'bg-emerald-500' : isDark ? 'bg-slate-700' : 'bg-slate-300'}`}><div className={`absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform ${u.perms?.[k] ? 'translate-x-4' : 'translate-x-0.5'}`} /></div></div></label>))}</div>)}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // 元件：命盤四柱表格 (BaziPillarTable)
        // ============================================================
        const BaziPillarTable = ({ chartData, isLoading, isDark, hour, perms, ELEMENT_STYLES, StarLabel, CharacterWithElement }) => (
            <div className={`rounded-xl border overflow-hidden shadow-xl transition-all duration-300 ${isLoading ? 'opacity-50 pointer-events-none' : 'opacity-100'} ${isDark ? "bg-slate-900/40 border-slate-700" : "bg-white border-slate-200"}`}>
                {['四柱', '主星', '天干', '地支', '藏干', '副星'].map((label, rIdx) => {
                    const id = ['pillar', 'main', 'stem', 'branch', 'sub_char', 'sub_star'][rIdx];
                    return (
                        <div key={id} className={`grid grid-cols-[16%_21%_21%_21%_21%] border-b last:border-0 ${isDark ? "border-slate-700" : "border-slate-200"}`}>
                            <div className={`flex items-center justify-center border-r font-bold text-[clamp(0.7rem,3vw,1rem)] uppercase text-center ${isDark ? "bg-slate-900/40 text-slate-500 border-slate-700" : "bg-slate-50/50 text-slate-400"}`}>{label}</div>
                            {(chartData && chartData.pillars) ? chartData.pillars.map((p, pIdx) => (
                                <div key={pIdx} className={`relative flex flex-col items-center justify-center p-1.5 sm:p-4 border-r last:border-0 ${isDark ? "border-slate-700" : "border-slate-200"}`}>
                                    {id === 'pillar' && <span className={`font-bold text-[10px] sm:text-sm ${p.label === '日柱' ? (isDark ? "text-yellow-500" : "text-yellow-600") : (isDark ? "text-slate-300" : "text-slate-600")}`}>{p.label}</span>}
                                    {id === 'main' && (hour === -1 && pIdx === 3 ? <span className="opacity-20 text-[10px]">－</span> : <StarLabel starInfo={p.main} isDayMaster={p.label === '日柱'} />)}
                                    {id === 'stem' && (hour === -1 && pIdx === 3 ? <span className="text-2xl font-serif text-emerald-500">吉</span> : <CharacterWithElement char={p.stem} element={p.stemElement} color={p.stemColor} />)}
                                    {id === 'branch' && (hour === -1 && pIdx === 3 ? <span className="text-2xl font-serif text-emerald-500">時</span> : (
                                        <React.Fragment>
                                            <CharacterWithElement char={p.branch} element={p.branchElement} color={p.branchColor} />
                                            {/* 驛馬星標記：寅申巳亥 ＋ 啟用 travelingHorse 權限時，於右下角顯示 🐎 */}
                                            {perms?.travelingHorse && ['寅', '申', '巳', '亥'].includes(p.branch) && (
                                                <div className="absolute bottom-0 right-0.5 pointer-events-none text-[10px] sm:text-xs leading-none select-none" title="驛馬星">
                                                    🐎
                                                </div>
                                            )}
                                        </React.Fragment>
                                    ))}

                                    {id === 'sub_char' && (hour === -1 && pIdx === 3 ? <span className="opacity-20 text-[10px]">－</span> : <div className="grid grid-cols-3 w-full gap-0 px-0.5">{p.sub?.map((s, sIdx) => <div key={sIdx} className="flex justify-center items-center h-8 text-center"><CharacterWithElement char={s.char} element={s.star?.element} color={s.star?.color} isSmall isYueling={s.isYueling} /></div>)}</div>)}
                                    {id === 'sub_star' && (hour === -1 && pIdx === 3 ? <span className="opacity-20 text-[10px]">－</span> : <div className="grid grid-cols-3 w-full gap-0 items-start px-px text-center">{p.sub?.map((s, sIdx) => (<div key={sIdx} className="flex flex-col items-center flex-shrink-0 text-center"><span className={`text-[8px] font-bold mb-0.5 ${isDark ? "text-slate-500" : "text-slate-400"}`}>{s.type}</span>{s.star ? <StarLabel starInfo={s.star} isVertical extraSmall /> : <span className="opacity-10 text-[10px]">－</span>}</div>))}</div>)}
                                </div>
                            )) : [1, 2, 3, 4].map(i => <div key={i} className="h-12 border-r last:border-0 animate-pulse bg-slate-200/20"></div>)}
                        </div>
                    );
                })}
            </div>
        );

        // ============================================================
        // 元件：大運流年區塊 (FortuneSection)
        // ============================================================
        const FortuneSection = ({ chartData, isDark, perms, ELEMENT_STYLES, CURRENT_REAL_YEAR, StarLabel, RomanceIcon, WealthIcon, HorseIcon }) => {
            if (!chartData?.fortunePillars) return null;
            return (
                <React.Fragment>
                    <div className={`rounded-2xl border ${isDark ? "border-slate-700 shadow-2xl" : "border-slate-800/50 shadow-xl"} overflow-hidden overflow-x-auto no-scrollbar`}><table className="fortune-table"><thead className={isDark ? "bg-slate-900 border-b border-slate-700" : "bg-white"}><tr className="text-slate-400 font-bold uppercase tracking-widest text-[9px] sm:text-[10px]"><th className={`w-[11%] text-center ${isDark ? "bg-slate-900" : "bg-white"}`}>項目</th>{chartData.fortunePillars.map((p, i) => <th key={i} className={`border-l ${isDark ? "border-slate-700" : "border-slate-800/30"} text-center`}>{p.label}</th>)}</tr></thead><tbody className={isDark ? "bg-slate-900/20" : "bg-white"}><tr><td className={`font-bold text-slate-500 text-[9px] sm:text-xs text-center ${isDark ? "bg-slate-900/50" : "bg-slate-100"}`}>十神</td>{chartData.fortunePillars.map((p, i) => <td key={i} className={`px-px text-center border-l ${isDark ? "border-slate-700/30" : "border-slate-800/10"}`}>{p.label === '童限' ? null : <StarLabel starInfo={p.tenGod} isFortune extraSmall />}</td>)}</tr><tr><td className={`font-bold text-slate-500 text-[9px] sm:text-xs text-center ${isDark ? "bg-slate-900/50" : "bg-slate-100"}`}>運程</td>{chartData.fortunePillars.map((p, i) => (<td key={i} className={`relative text-center border-l ${isDark ? "border-slate-700/30" : "border-slate-800/10"}`}>{p.stem ? (<div className="flex flex-col items-center justify-center text-center"><div className="flex gap-px items-center justify-center leading-none font-serif font-bold text-[11px] sm:text-lg"><span className={ELEMENT_STYLES[p.stemColor || "none"].color}>{p.stem}</span><span className={ELEMENT_STYLES[p.branchColor || "none"].color}>{p.branch}</span></div></div>) : <span className="opacity-20 text-[10px]">－</span>}<HorseIcon level={p.horse} isCompact minLevel={1} /></td>))}</tr><tr><td className={`font-bold text-slate-500 text-[9px] sm:text-xs text-center border-b-2 ${isDark ? "bg-slate-900/50 border-slate-700" : "bg-white border-slate-800/50"}`}>周歲</td>{chartData.fortunePillars.map((p, i) => <td key={i} className={`text-blue-400 font-bold text-[9px] sm:text-xs border-b-2 text-center border-l ${isDark ? "border-slate-800/50" : "border-slate-800/50"}`}>{p.age}</td>)}</tr><tr><td className={`text-slate-700 font-bold text-[9px] sm:text-xs uppercase text-center ${isDark ? "bg-slate-900/50" : "bg-slate-100"}`}>流年</td>{chartData.fortunePillars.map((p, pIdx) => { const startOffset = 10 - p.flowYears.length; return (<td key={pIdx} className={`p-0 align-top border-l ${isDark ? "border-slate-700/30" : "border-slate-800/10"}`}><div className="flex flex-col">{[...Array(10)].map((_, rowIndex) => { const dataIdx = rowIndex - startOffset; const fy = (dataIdx >= 0) ? p.flowYears[dataIdx] : null; if (!fy) return <div key={rowIndex} className="flow-year-row"></div>; return (<div key={rowIndex} className={`flow-year-row ${rowIndex === 4 ? (isDark ? 'border-b-2 border-slate-600/50' : 'border-b-2 border-slate-400/50') : 'border-b border-slate-800/10'} last:border-0 ${fy.year === CURRENT_REAL_YEAR ? 'highlight-year' : ''}`}><div className="flex items-center gap-px font-serif leading-none font-bold text-[10px] sm:text-[13px] text-center justify-center"><span className={ELEMENT_STYLES[fy.stemColor || "none"].color}>{fy.stem}</span><span className={perms?.flowBranchColor ? "" : (isDark ? 'text-slate-400' : 'text-slate-950')}>{fy.branch}</span></div><RomanceIcon level={fy.romance} isCompact /><WealthIcon level={fy.wealth} isCompact /><HorseIcon level={fy.horse} isCompact /></div>); })}</div></td>); })}</tr></tbody></table></div>
                    {/* ===== 流年點評手風琴（含財運/事業/桃花/健康/避凶分頁） ===== */}
                    {perms?.analysis && <div className="mt-4"><FlowYearAccordion chartData={chartData} isDark={isDark} perms={perms} /></div>}

                </React.Fragment>
            );
        };

        // ============================================================
        // 元件：流月流日萬年曆 (CalendarSection)
        // ============================================================
        const CalendarSection = ({ isDark, calYear, setCalYear, calMonth, setCalMonth, calendarData, isCalLoading, perms, ELEMENT_STYLES, RomanceIcon, WealthIcon, HorseIcon }) => {
            const today = new Date();
            return (
                <div className={`p-4 sm:p-6 rounded-2xl border transition-all duration-300 ${isDark ? 'bg-slate-900/40 border-slate-800 shadow-2xl' : 'bg-white border-slate-200 shadow-xl'}`}>
                    <div className="flex flex-row items-center justify-between gap-1 mb-6 sm:mb-8 text-left">
                        <div className="flex items-center gap-1 sm:gap-3 shrink-0"><div className="w-1 h-5 sm:w-1.5 sm:h-6 bg-blue-500 rounded-full"></div><h2 className="font-black text-sm sm:text-xl tracking-tighter sm:tracking-widest uppercase">流月流日</h2></div>
                        <div className="flex items-center gap-1.5 sm:gap-3 shrink-0">
                            <div className="flex flex-col gap-0.5 sm:gap-1"><span className="text-[6px] sm:text-[8px] font-bold opacity-40 uppercase">查詢西元</span><input type="number" value={calYear} onChange={(e) => setCalYear(parseInt(e.target.value) || today.getFullYear())} className={`rounded px-1 py-0.5 text-[10px] sm:text-xs border h-7 sm:h-9 appearance-none w-14 sm:w-24 max-w-[65px] sm:max-w-none ${isDark ? "bg-slate-950 border-slate-800 text-slate-100" : "bg-white border-slate-200"}`} /></div>
                            <div className="flex flex-col gap-0.5 sm:gap-1"><span className="text-[6px] sm:text-[8px] font-bold opacity-40 uppercase">查詢月份</span><select value={calMonth} onChange={(e) => setCalMonth(parseInt(e.target.value) || 1)} className={`rounded px-1 py-0.5 text-[10px] sm:text-xs border h-7 sm:h-9 appearance-none w-14 sm:w-24 max-w-[65px] sm:max-w-none ${isDark ? "bg-slate-950 border-slate-800 text-slate-100" : "bg-white border-slate-200"}`}>{Array.from({ length: 12 }, (_, i) => <option key={i + 1} value={i + 1}>{i + 1}月</option>)}</select></div>
                        </div>
                    </div>
                    <div className="mb-8 w-full overflow-hidden"><table className="w-full table-fixed border-collapse border border-slate-700/30"><thead><tr className={isDark ? "bg-slate-800/50" : "bg-slate-100/50"}><th className="p-0.5 border border-slate-700/30 text-[7px] sm:text-xs font-bold w-[13%] sm:w-20">月份</th>{Array.from({ length: 12 }, (_, i) => <th key={i} className="p-0.5 border border-slate-700/30 text-[7px] sm:text-xs font-bold">{i + 1}</th>)}</tr></thead><tbody><tr><td className="p-0.5 border border-slate-700/30 text-[7px] sm:text-xs font-bold text-center">流月</td>{calendarData?.flowMonths?.map((m, i) => (<td key={i} className="p-0 border border-slate-700/30 font-serif font-bold text-center relative h-10 sm:h-12 overflow-hidden text-center"><div className="flex flex-row items-center justify-center gap-0 text-[clamp(8px,2.1vw,14px)] sm:text-base leading-none w-full h-full"><span className={ELEMENT_STYLES[perms?.calendarColors ? m.stemColor : "none"].color}>{m.stem}</span><span className={isDark ? "text-slate-400" : "text-slate-600"}>{m.branch}</span></div><RomanceIcon level={m.romance} isCompact /><WealthIcon level={m.wealth} isCompact /><HorseIcon level={m.horse} isCompact minLevel={1} /></td>)) || Array.from({ length: 12 }, (_, i) => <td key={i} className="p-1 border border-slate-700/30 opacity-20 text-center text-[7px]">...</td>)}</tr></tbody></table></div>
                    {isCalLoading && <div className="h-1 loading-shimmer w-full rounded-full mb-4"></div>}
                    <div className="grid grid-cols-7 gap-1 sm:gap-2">
                        {['一', '二', '三', '四', '五', '六', '日'].map(w => (<div key={w} className="text-center text-[8px] sm:text-[10px] font-black opacity-40 pb-1.5 border-b border-slate-700/20 mb-1.5">週{w}</div>))}
                        {calendarData?.days ? (
                            <React.Fragment>
                                {Array.from({ length: calendarData.days[0].weekday }).map((_, i) => (<div key={`empty-${i}`} className="h-12 sm:h-16 opacity-0"></div>))}
                                {calendarData.days.map((d, idx) => (
                                    <div key={idx} className={`p-0.5 sm:p-2 rounded-lg border flex flex-col transition-all relative h-12 sm:h-auto ${d.day === today.getDate() && calMonth === (today.getMonth() + 1) && calYear === today.getFullYear() ? 'ring-1.5 ring-blue-500 bg-blue-500/5 shadow-inner' : isDark ? 'bg-slate-950 border-slate-800 shadow-sm' : 'bg-white border-slate-200 shadow-sm'}`}>
                                        <div className="flex justify-between items-start w-full h-2.5 sm:h-5"><div className="text-[7px] sm:text-[10px] font-black opacity-30 leading-none pl-0.5">{d.day}</div><div className="relative w-3 h-3 sm:w-5 sm:h-5"><RomanceIcon level={d.romance} isCompact /></div></div>
                                        <div className="flex items-center justify-center gap-0 font-serif font-bold text-[clamp(10px,4.5vw,14px)] sm:text-[14px] leading-none mt-1 sm:mt-1.5"><span className={ELEMENT_STYLES[perms?.calendarColors ? d.stemColor : "none"].color}>{d.stem}</span><span className={isDark ? "text-slate-300" : "text-slate-700"}>{d.branch}</span></div>
                                        <WealthIcon level={d.wealth} isCompact />
                                        <HorseIcon level={d.horse} isCompact />
                                    </div>
                                ))}
                            </React.Fragment>
                        ) : <div className="col-span-full py-10 opacity-30 italic text-[10px]">正在載入數據...</div>}
                    </div>
                </div>
            );
        };

        // 五行分區元資料（全量 Tailwind class，避免 CDN purge 問題）
        const PROFILE_ELEMENTS = ['木', '火', '土', '金', '水'];
        const PROFILE_ELEMENT_META = {
            '木': { bg: 'bg-emerald-500', textCls: 'text-emerald-700', darkTextCls: 'text-emerald-400', borderDrop: 'border-emerald-400', bgDrop: 'bg-emerald-50', darkBgDrop: 'bg-emerald-900/10' },
            '火': { bg: 'bg-red-500', textCls: 'text-red-700', darkTextCls: 'text-red-400', borderDrop: 'border-red-400', bgDrop: 'bg-red-50', darkBgDrop: 'bg-red-900/10' },
            '土': { bg: 'bg-amber-600', textCls: 'text-amber-700', darkTextCls: 'text-amber-400', borderDrop: 'border-amber-400', bgDrop: 'bg-amber-50', darkBgDrop: 'bg-amber-900/10' },
            '金': { bg: 'bg-slate-400', textCls: 'text-slate-600', darkTextCls: 'text-slate-400', borderDrop: 'border-slate-400', bgDrop: 'bg-slate-100', darkBgDrop: 'bg-slate-700/30' },
            '水': { bg: 'bg-blue-500', textCls: 'text-blue-700', darkTextCls: 'text-blue-400', borderDrop: 'border-blue-400', bgDrop: 'bg-blue-50', darkBgDrop: 'bg-blue-900/10' },
            '未分類': { bg: 'bg-slate-300', textCls: 'text-slate-500', darkTextCls: 'text-slate-500', borderDrop: 'border-slate-400', bgDrop: 'bg-slate-100', darkBgDrop: 'bg-slate-700/30' },
        };

        // ============================================================
        // 元件：命盤管理面板 (ProfileSwitcherPanel)
        //   桌面：錢定按鈕下方下拉面板 (點擊觸發)
        //   行動：底部 Sheet (從下方滑出)
        //   命盤拖放：HTML5 DnD (桌面) + 長按 400ms 觸控拖移 (行動)
        //   分類排序：桌面拖移分組標題 / 行動按 ↑↓ 按鈕
        // ============================================================
        const ProfileSwitcherPanel = ({ profiles, groupedProfiles, activeProfileName, isDark, onClose, onLoadProfile, onDeleteProfile, onCategoryChange }) => {
            const [draggingId, setDraggingId] = React.useState(null);
            const [dragOverCat, setDragOverCat] = React.useState(null);   // 命盤卡片拖进哪個 zone
            const [dragOverEl, setDragOverEl] = React.useState(null);     // 分類標題拖进哪個 zone
            const panelBodyRef = React.useRef(null);
            const touchTimerRef = React.useRef(null);
            const touchActiveRef = React.useRef(false);
            const touchIdRef = React.useRef(null);
            const ghostRef = React.useRef(null);
            const dragItemRef = React.useRef(null); // { kind: 'cat'|'card', value }

            // 分類順序：專属所屬 component，儲 localStorage
            const [catOrder, setCatOrder] = React.useState(() => {
                try { const s = localStorage.getItem('lp-cat-order'); if (s) return JSON.parse(s); } catch { }
                return ['\u6728', '\u706b', '\u571f', '\u91d1', '\u6c34'];
            });
            React.useEffect(() => { localStorage.setItem('lp-cat-order', JSON.stringify(catOrder)); }, [catOrder]);

            // 行動↑↓ 移動分類順序
            const moveCat = (el, dir) => setCatOrder(prev => {
                const next = [...prev]; const idx = next.indexOf(el); const ni = idx + dir;
                if (ni < 0 || ni >= next.length) return prev;
                [next[idx], next[ni]] = [next[ni], next[idx]]; return next;
            });

            // 標題 DnD (桌面別类拖移)
            const onCatHS = (e, el) => { dragItemRef.current = { kind: 'cat', value: el }; e.dataTransfer.setData('text/plain', 'cat:' + el); e.dataTransfer.effectAllowed = 'move'; };
            const onCatHO = (e, el) => { e.preventDefault(); if (dragItemRef.current?.kind === 'cat') setDragOverEl(el); };
            const onCatHL = (e) => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOverEl(null); };
            const onCatHD = (e, target) => {
                e.preventDefault();
                if (dragItemRef.current?.kind !== 'cat') return;
                const src = dragItemRef.current.value;
                if (src !== target) setCatOrder(prev => {
                    const next = [...prev];
                    next.splice(next.indexOf(src), 1);
                    next.splice(next.indexOf(target), 0, src);
                    return next;
                });
                dragItemRef.current = null; setDragOverEl(null);
            };

            // 命盤卡片 Desktop DnD
            const onDS = (e, id) => { dragItemRef.current = { kind: 'card', value: id }; e.dataTransfer.setData('text/plain', id); e.dataTransfer.effectAllowed = 'move'; setDraggingId(id); };
            const onDO = (e, cat) => { e.preventDefault(); if (dragItemRef.current?.kind === 'card' && dragOverCat !== cat) setDragOverCat(cat); };
            const onDL = (e, cat) => { if (!e.currentTarget.contains(e.relatedTarget) && dragOverCat === cat) setDragOverCat(null); };
            const onDrop = (e, cat) => { e.preventDefault(); if (dragItemRef.current?.kind === 'card') { const id = dragItemRef.current.value; if (id) onCategoryChange(id, cat); } dragItemRef.current = null; setDraggingId(null); setDragOverCat(null); };
            const onDE = () => { dragItemRef.current = null; setDraggingId(null); setDragOverCat(null); setDragOverEl(null); };

            // 命盤卡片 Mobile Touch DnD
            // 換登非 passive touchmove，阻止拖移時頁面滚動
            React.useEffect(() => {
                const el = panelBodyRef.current;
                if (!el) return;
                const onTM = (e) => {
                    if (!touchActiveRef.current) return;
                    e.preventDefault();
                    const t = e.touches[0];
                    if (ghostRef.current) {
                        ghostRef.current.style.left = `${t.clientX - ghostRef.current._ox}px`;
                        ghostRef.current.style.top = `${t.clientY - ghostRef.current._oy}px`;
                        ghostRef.current.style.pointerEvents = 'none';
                    }
                    const under = document.elementFromPoint(t.clientX, t.clientY);
                    setDragOverCat(under?.closest('[data-dz]')?.dataset?.dz || null);
                };
                el.addEventListener('touchmove', onTM, { passive: false });
                return () => el.removeEventListener('touchmove', onTM);
            }, []);
            const onTS = (e, id) => {
                const card = e.currentTarget; const rect = card.getBoundingClientRect();
                const t = e.touches[0]; const sx = t.clientX, sy = t.clientY;
                touchTimerRef.current = setTimeout(() => {
                    const g = document.createElement('div');
                    g.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;z-index:9999;pointer-events:none;opacity:0.85;border-radius:10px;box-shadow:0 20px 50px rgba(0,0,0,.35);transform:scale(1.06) rotate(1.5deg);background:${isDark ? '#1e293b' : '#fff'};border:1.5px solid ${isDark ? '#475569' : '#e2e8f0'};overflow:hidden;`;
                    g.innerHTML = card.innerHTML; g._ox = sx - rect.left; g._oy = sy - rect.top;
                    document.body.appendChild(g); ghostRef.current = g;
                    touchActiveRef.current = true; touchIdRef.current = id;
                    setDraggingId(id); if (navigator.vibrate) navigator.vibrate([30, 10, 30]);
                }, 400);
            };
            const onTE = (e) => {
                clearTimeout(touchTimerRef.current);
                if (!touchActiveRef.current) return;
                const t = e.changedTouches[0];
                if (ghostRef.current) ghostRef.current.style.display = 'none';
                const under = document.elementFromPoint(t.clientX, t.clientY);
                if (ghostRef.current) ghostRef.current.style.display = '';
                const zone = under?.closest('[data-dz]');
                if (zone && touchIdRef.current) onCategoryChange(touchIdRef.current, zone.dataset.dz);
                if (ghostRef.current) { ghostRef.current.remove(); ghostRef.current = null; }
                touchActiveRef.current = false; touchIdRef.current = null;
                setDraggingId(null); setDragOverCat(null);
            };
            const onTC = () => {
                clearTimeout(touchTimerRef.current);
                if (ghostRef.current) { ghostRef.current.remove(); ghostRef.current = null; }
                touchActiveRef.current = false; touchIdRef.current = null;
                setDraggingId(null); setDragOverCat(null);
            };

            // 渲染單張命盤卡片
            const renderCard = (p) => {
                const isActive = activeProfileName === p.name;
                const isDragging = draggingId === p.id;
                return (
                    <div key={p.id} draggable="true"
                        onDragStart={(e) => onDS(e, p.id)} onDragEnd={onDE}
                        onTouchStart={(e) => onTS(e, p.id)} onTouchEnd={onTE} onTouchCancel={onTC}
                        onClick={() => { if (!touchActiveRef.current) onLoadProfile(p); }}
                        style={{ userSelect: 'none' }}
                        className={`flex items-center gap-2 px-3 py-2.5 rounded-lg border cursor-grab transition-all duration-150 mb-1.5
                            ${isDragging ? 'opacity-20' : 'opacity-100'}
                            ${isActive
                                ? (isDark ? 'bg-slate-700 border-slate-500 ring-1 ring-blue-500/40' : 'bg-blue-50 border-blue-200')
                                : (isDark ? 'bg-slate-800/70 border-slate-700 hover:bg-slate-700' : 'bg-white border-slate-200 hover:bg-slate-50')}
                            shadow-sm`}
                    >
                        <div className="flex flex-col min-w-0 flex-1">
                            <span className={`text-[13px] font-bold truncate ${isActive ? (isDark ? 'text-blue-400' : 'text-blue-600') : (isDark ? 'text-slate-200' : 'text-slate-800')}`}>{p.name}</span>
                            <span className={`text-[10px] ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>{p.gregYear}/{String(p.month).padStart(2, '0')}/{String(p.day).padStart(2, '0')} {p.gender === 'male' ? '\u2642' : '\u2640'}</span>
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); onDeleteProfile(e, p.id, p.name); }} className="p-1 text-slate-300 hover:text-red-500 transition-all flex-shrink-0">
                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                );
            };

            // 渲染分類區塊（含標題拖放排序）
            const renderZone = (element, idx) => {
                const meta = PROFILE_ELEMENT_META[element];
                const items = groupedProfiles[element] || [];
                const isOver = dragOverCat === element;
                const isHeaderOver = dragOverEl === element;
                if (element === '\u672a\u5206\u985e' && items.length === 0) return null;
                return (
                    <div key={element} className="mb-3">
                        {/* 分類標題：可拖移排序 + 行動↑↓ 按鈕 */}
                        <div
                            draggable={element !== '\u672a\u5206\u985e'}
                            onDragStart={(e) => element !== '\u672a\u5206\u985e' && onCatHS(e, element)}
                            onDragOver={(e) => element !== '\u672a\u5206\u985e' && onCatHO(e, element)}
                            onDragLeave={onCatHL}
                            onDrop={(e) => element !== '\u672a\u5206\u985e' && onCatHD(e, element)}
                            onDragEnd={onDE}
                            className={`flex items-center gap-2 px-3 py-1.5 text-[10px] font-black tracking-widest rounded-t-lg transition-all
                                ${element !== '\u672a\u5206\u985e' ? 'cursor-grab' : ''}
                                ${isHeaderOver ? (isDark ? 'bg-slate-600 ring-1 ring-blue-400' : 'bg-blue-100 ring-1 ring-blue-300') : (isDark ? 'bg-slate-800' : 'bg-slate-100')}`}
                        >
                            <span className={`w-2 h-2 rounded-full flex-shrink-0 ${meta.bg}`} />
                            <span className={isDark ? meta.darkTextCls : meta.textCls}>{meta.emoji} {element}</span>
                            <span className="opacity-30 ml-auto font-normal normal-case">{items.length}</span>
                            {/* 行動端↑↓ 按鈕 */}
                            {element !== '\u672a\u5206\u985e' && (
                                <div className="flex gap-0.5 sm:hidden">
                                    <button onClick={(e) => { e.stopPropagation(); moveCat(element, -1); }}
                                        disabled={idx === 0}
                                        className="p-0.5 rounded opacity-50 disabled:opacity-20 hover:opacity-100 transition-all"
                                    >↑</button>
                                    <button onClick={(e) => { e.stopPropagation(); moveCat(element, 1); }}
                                        disabled={idx === catOrder.length - 1}
                                        className="p-0.5 rounded opacity-50 disabled:opacity-20 hover:opacity-100 transition-all"
                                    >↓</button>
                                </div>
                            )}
                        </div>
                        {/* 拖放區域 */}
                        <div data-dz={element}
                            onDragOver={(e) => onDO(e, element)}
                            onDragLeave={(e) => onDL(e, element)}
                            onDrop={(e) => onDrop(e, element)}
                            className={`min-h-[50px] rounded-b-lg p-2 border-2 transition-all duration-200
                                ${isOver ? `${meta.borderDrop} ${isDark ? meta.darkBgDrop : meta.bgDrop}` : 'border-transparent'}
                                ${isDark ? 'bg-slate-900/40' : 'bg-slate-50/60'}`}
                        >
                            {items.length === 0
                                ? <div className="h-8 flex items-center justify-center"><span className={`text-[10px] italic ${isDark ? 'text-slate-600' : 'text-slate-300'}`}>{isOver ? '\u653e\u958b\u4ee5\u79fb\u5165 \u2193' : '\u62d6\u79fb\u547d\u76e4\u81f3\u6b64'}</span></div>
                                : items.map(renderCard)
                            }
                        </div>
                    </div>
                );
            };

            const displayOrder = catOrder.concat(['\u672a\u5206\u985e']);

            return (
                <React.Fragment>
                    <div className="fixed inset-0 z-[99]" onClick={onClose} />
                    <div className={`z-[100] flex flex-col overflow-hidden shadow-2xl
                        fixed bottom-0 left-0 right-0 max-h-[78vh] rounded-t-2xl
                        sm:absolute sm:bottom-auto sm:left-auto sm:right-0 sm:top-full sm:mt-2 sm:w-80 sm:max-h-[72vh] sm:rounded-xl
                        ${isDark ? 'bg-slate-900 border border-slate-700' : 'bg-white border border-slate-200'}`}
                    >
                        <div className={`flex items-center justify-between px-4 py-3 flex-shrink-0 border-b ${isDark ? 'border-slate-700' : 'border-slate-100'}`}>
                            <div className="absolute top-2.5 left-1/2 -translate-x-1/2 w-8 h-1 rounded-full bg-slate-300/60 sm:hidden" />
                            <div>
                                <p className="text-[10px] font-black uppercase tracking-widest text-blue-500">命盤管理</p>
                                <p className={`text-xs font-semibold ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>長按拖移分類 · 共 {profiles.length} 組</p>
                            </div>
                            <button onClick={onClose} className={`p-1.5 rounded-full transition-all ${isDark ? 'hover:bg-slate-800 text-slate-400' : 'hover:bg-slate-100 text-slate-400'}`}>✕</button>
                        </div>
                        <div ref={panelBodyRef} className="overflow-y-auto no-scrollbar p-3 flex-1">
                            {profiles.length === 0
                                ? <div className="py-12 flex flex-col items-center gap-2 opacity-40"><span className="text-3xl">\ud83d\udced</span><p className="text-xs font-bold">尚未儲存任何命盤</p></div>
                                : displayOrder.map((el, idx) => renderZone(el, idx))
                            }
                        </div>
                    </div>
                </React.Fragment>
            );
        };

        // ============================================================
        // 元件：桃花感應標記 (RomanceIcon) — 定義於 App 外部
        // perms.romance 與 isDark 由呼叫端作為 prop 傳入
        // ============================================================
        const RomanceIcon = ({ level, isCompact = false, perms, isDark }) => {
            if (!level || !perms?.romance) return null;

            const isHarmony = level > 0;

            let textColor = "";
            let bgColor = "";

            if (isHarmony) {
                textColor = "text-pink-500";
                bgColor = "bg-pink-400/25";
            } else {
                if (Math.abs(level) === 2) {
                    textColor = isDark ? "text-black" : "text-white";
                    bgColor = isDark ? "bg-white" : "bg-black";
                } else {
                    textColor = isDark ? "text-white" : "text-black";
                    bgColor = "transparent";
                }
            }

            const containerSize = isCompact ? "w-3 h-3 sm:w-5 sm:h-5" : "w-3.5 h-3.5 sm:w-6 sm:h-6";
            const dotSize = isCompact ? "w-2.5 h-2.5 sm:w-4.5 sm:h-4.5" : "w-3 h-3 sm:w-5 sm:h-5";
            const textSize = isCompact ? "text-[6px] sm:text-[8px]" : "text-[7px] sm:text-[9px]";

            return (
                <div className={`absolute top-0 right-0 pointer-events-none flex items-center justify-center p-0.5 ${containerSize}`}>
                    {Math.abs(level) === 2 ? (
                        <div className={`${dotSize} rounded-full ${bgColor} flex items-center justify-center`}>
                            <span className={`${textSize} font-black ${textColor} leading-none block text-center transform translate-y-[0.1px]`}>桃</span>
                        </div>
                    ) : (
                        <div className="flex items-center justify-center w-full h-full">
                            <span className={`${textSize} font-black ${textColor} leading-none`}>桃</span>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // 元件：財旺感應標記 (WealthIcon) — 定義於 App 外部
        // perms.wealth 由呼叫端作為 prop 傳入
        // ============================================================
        const WealthIcon = ({ level, isCompact = false, perms }) => {
            if (!level || !perms?.wealth) return null;

            const textSize = isCompact ? "text-[6px] sm:text-[8px]" : "text-[7px] sm:text-[9px]";
            const containerSize = isCompact ? "w-3 h-3 sm:w-5 sm:h-5" : "w-3.5 h-3.5 sm:w-6 sm:h-6";

            return (
                <div className={`absolute bottom-0 left-0 pointer-events-none flex items-center justify-center p-0.5 ${containerSize}`}>
                    <div className="relative flex items-center justify-center w-full h-full">
                        {/* Level 3: 五芒星背景（透明度 50%） */}
                        {level >= 3 && (
                            <div className="absolute inset-0 flex items-center justify-center" style={{ opacity: 0.5 }}>
                                <svg viewBox="0 0 24 24" style={{ width: '100%', height: '100%', fill: '#facc15' }}>
                                    <path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z" />
                                </svg>
                            </div>
                        )}
                        {/* Level 2: 圓形背景（透明度 45%） */}
                        {level === 2 && (
                            <div className="absolute inset-0 flex items-center justify-center" style={{ opacity: 0.45 }}>
                                <div style={{ width: '90%', height: '90%', borderRadius: '50%', backgroundColor: '#facc15' }}></div>
                            </div>
                        )}
                        {/* 文字層：黃色「財」字 */}
                        <span className={`${textSize} font-black text-yellow-500 leading-none relative z-10`}>財</span>
                    </div>
                </div>
            );
        };

        // ============================================================
        // 元件：驛馬感應標記 (HorseIcon) — 定義於 App 外部
        // 顯示於格子右下角。年柱感應用橘色圈，日柱感應用黃色圈。
        // minLevel 控制顯示門檻（預設 10，即只顯示多重感應）：
        //   運程/流月傳 minLevel={1}，見到任何感應即顯示（作為鏈結觸發標記）。
        //   流年/流日使用預設 minLevel=10，只顯示多重感應（三刑或相沖已形成雙重疊加）。
        //   年/日皆以相同橘/黃圖案顯示，確保整條感應鏈視覺一致。
        // ============================================================
        const HorseIcon = ({ level, isCompact = false, perms, minLevel = 10 }) => {
            if (!level || !perms?.travelingHorse) return null;
            const { y, d } = level;
            const showY = y >= minLevel;
            const showD = d >= minLevel;
            if (!showY && !showD) return null;

            const renderDot = (type) => {
                // 年柱固定橘色，日柱固定黃色，單次/多重感應均使用相同色系（圖案一致性原則）
                const cls = type === 'y' ? 'bg-horse-y' : 'bg-horse-d';
                return (
                    <div className={`horse-dot ${cls} shadow-sm`} key={type}>
                        🐎
                    </div>
                );
            };

            return (
                <div className="absolute bottom-0 right-0 pointer-events-none p-0.5 sm:p-1 max-w-full">
                    <div className="horse-container">
                        {showY && renderDot('y')}
                        {showD && renderDot('d')}
                    </div>
                </div>
            );
        };

        const App = () => {
            const CURRENT_REAL_YEAR = new Date().getFullYear();
            const [isDark, setIsDark] = useState(false);
            const [gender, setGender] = useState('male');
            const [threshold, setThreshold] = useState(0);
            const [isDst, setIsDst] = useState(false);

            const [gregYear, setGregYear] = useState(2026);
            const [rocYear, setRocYear] = useState(115);
            const [month, setMonth] = useState(2);
            const [day, setDay] = useState(4);
            const [hour, setHour] = useState(4);
            const [minute, setMinute] = useState(10);

            const [calYear, setCalYear] = useState(new Date().getFullYear());
            const [calMonth, setCalMonth] = useState(new Date().getMonth() + 1);
            const [calendarData, setCalendarData] = useState(null);
            const [isCalLoading, setIsCalLoading] = useState(false);

            const [chartData, setChartData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            const [perms, setPerms] = useState({});  // 預設空物件，避免 ?. 存取 null 造成著色/桃花全掛

            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [adminEmail, setAdminEmail] = useState('');
            const [adminUid, setAdminUid] = useState('');
            const [adminPerms, setAdminPerms] = useState({ colors: true, flowBranchColor: true, romance: false, wealth: false, analysis: false, calendarColors: true });
            const [adminMsg, setAdminMsg] = useState('');
            const [adminSaving, setAdminSaving] = useState(false);
            const [adminFoundUser, setAdminFoundUser] = useState(null);
            const [grantedUsers, setGrantedUsers] = useState([]);
            const [grantedUsersLoading, setGrantedUsersLoading] = useState(false);
            const [editingUid, setEditingUid] = useState(null);
            const [adminSearchMode, setAdminSearchMode] = useState('email');  // 'email' | 'uid'
            const [adminUidInput, setAdminUidInput] = useState('');

            const baziAbortRef = useRef(null);
            const calAbortRef = useRef(null);
            const baziDebounceRef = useRef(null);   // 防止快速輸入觸發大量請求
            const calDebounceRef = useRef(null);

            const [user, setUser] = useState(null);
            const [profiles, setProfiles] = useState([]);
            const [saveInputName, setSaveInputName] = useState("");
            const [activeProfileName, setActiveProfileName] = useState(null); // 目前顯示的命盤名稱
            const [showProfilesPanel, setShowProfilesPanel] = useState(false); // 命盤管理面板開關

            const isAdmin = useMemo(() => user && user.uid === ADMIN_UID, [user]);
            const isLoggedIn = useMemo(() => !!user, [user]);

            const ELEMENT_STYLES = useMemo(() => ({
                '金': { color: isDark ? 'text-slate-400' : 'text-slate-600', bg: 'bg-slate-400', bar: 'bg-slate-400' },
                '木': { color: isDark ? 'text-emerald-500' : 'text-emerald-700', bg: 'bg-emerald-500', bar: 'bg-emerald-500' },
                '水': { color: isDark ? 'text-blue-500' : 'text-blue-700', bg: 'bg-blue-500', bar: 'bg-blue-500' },
                '火': { color: isDark ? 'text-red-500' : 'text-red-600', bg: 'bg-red-500', bar: 'bg-red-500' },
                '土': { color: isDark ? 'text-[#a57c5a]' : 'text-[#8b4513]', bg: 'bg-[#a57c5a]', bar: 'bg-[#a57c5a]' },
                'none': { color: isDark ? 'text-slate-400' : 'text-slate-950', bg: isDark ? 'bg-slate-800' : 'bg-slate-200' }
            }), [isDark]);

            // ============================================================
            // Icon 元件包裹層 (App 內部 wrappers)
            // 三個 Icon 已移至 App 外部定義，此處建立綁定了當前 perms/isDark 的包裹
            // 讓 FortuneSection / CalendarSection 等下游呼叫端無需重構
            // ============================================================
            const BoundRomanceIcon = React.useCallback(
                (props) => <RomanceIcon {...props} perms={perms} isDark={isDark} />,
                [perms, isDark]
            );
            const BoundWealthIcon = React.useCallback(
                (props) => <WealthIcon {...props} perms={perms} />,
                [perms]
            );
            const BoundHorseIcon = React.useCallback(
                (props) => <HorseIcon {...props} perms={perms} />,
                [perms]
            );


            const hourOptions = useMemo(() => {
                const opts = [{ label: '吉時', val: -1 }];
                for (let i = 0; i < 24; i++) {
                    const branchIdx = Math.floor(((i + 1) % 24) / 2);
                    opts.push({ label: `${i}時 (${BRANCHES[branchIdx]})`, val: i });
                }
                return opts;
            }, []);

            const fetchBazi = useCallback(() => {
                if (!gregYear || !month || !day) return;
                // Debounce 500ms：避免連續改變輸入值時發出大量請求
                if (baziDebounceRef.current) clearTimeout(baziDebounceRef.current);
                baziDebounceRef.current = setTimeout(async () => {
                    if (baziAbortRef.current) baziAbortRef.current.abort();
                    baziAbortRef.current = new AbortController();
                    setIsLoading(true); setError(null);
                    try {
                        const headers = { "Content-Type": "application/json" };
                        if (user) { const token = await user.getIdToken(); headers["Authorization"] = `Bearer ${token}`; }
                        const response = await fetch(WORKER_URL, {
                            method: "POST",
                            headers: headers,
                            body: JSON.stringify({ type: 'bazi', gregYear, month, day, hour, minute, gender, isDst, calYear, calMonth }),
                            signal: baziAbortRef.current.signal
                        });
                        const data = await response.json();
                        if (data.error) throw new Error(data.error);
                        setChartData(data);
                        if (data.perms) setPerms(data.perms);  // 從 Worker 取得最新權限
                        if (data.calendarData) setCalendarData(data.calendarData);
                    } catch (err) { if (err.name !== 'AbortError') setError("運算引擎忙線中，請稍候再試"); }
                    finally { setIsLoading(false); }
                }, 500);
            }, [gregYear, month, day, hour, minute, gender, isDst, user, calYear, calMonth]);

            const fetchCalendar = useCallback(() => {
                // Debounce 400ms：萬年曆查詢也要防多打
                if (calDebounceRef.current) clearTimeout(calDebounceRef.current);
                calDebounceRef.current = setTimeout(async () => {
                    if (calAbortRef.current) calAbortRef.current.abort();
                    calAbortRef.current = new AbortController();
                    setIsCalLoading(true);
                    try {
                        const headers = { "Content-Type": "application/json" };
                        if (user) { const token = await user.getIdToken(); headers["Authorization"] = `Bearer ${token}`; }
                        const response = await fetch(WORKER_URL, {
                            method: "POST",
                            headers: headers,
                            body: JSON.stringify({ type: 'calendar', calYear, calMonth, gregYear, month, day }),
                            signal: calAbortRef.current.signal
                        });
                        const data = await response.json();
                        if (data.calendarData) setCalendarData(data.calendarData);
                        if (data.perms) setPerms(data.perms);
                    } catch (e) { if (e.name !== 'AbortError') console.error("Calendar Failed"); }
                    finally { setIsCalLoading(false); }
                }, 400);
            }, [calYear, calMonth, user, gregYear, month, day]);

            useEffect(() => { fetchBazi(); }, [fetchBazi]);
            useEffect(() => { fetchCalendar(); }, [fetchCalendar]);

            useEffect(() => {
                if (!window.FirebaseSDK) return;
                const { auth, onAuthStateChanged, getRedirectResult, db, doc, setDoc } = window.FirebaseSDK;

                // 處理 Redirect 登入的結果（忽略「無 pending」的正常狀況）
                getRedirectResult(auth)
                    .then(result => { if (result?.user) console.log('Redirect auth ok:', result.user.email); })
                    .catch(e => { if (e?.code !== 'auth/no-current-user') console.error('Redirect auth error:', e?.code); });

                const unsubscribe = onAuthStateChanged(auth, async (u) => {
                    if (u && !u.isAnonymous) {
                        setUser(u);
                        // 自動寫入 Firestore user_registry，讓管理員可透過 Email 找到此用戶
                        try {
                            await setDoc(doc(db, 'user_registry', u.email.toLowerCase()), {
                                uid: u.uid, email: u.email, name: u.displayName, updatedAt: Date.now()
                            }, { merge: true });
                        } catch (e) { console.error('Reg Error:', e?.code); }
                    } else {
                        setUser(null);
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !window.FirebaseSDK) { setProfiles([]); return; }
                const { db, collection, onSnapshot, query, limit } = window.FirebaseSDK;
                const unsubscribe = onSnapshot(query(collection(db, 'artifacts', 'luminous-path-pro', 'users', user.uid, 'profiles')), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => (a.order ?? 999) - (b.order ?? 999) || new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
                    setProfiles(data);
                });
                return () => unsubscribe();
            }, [user]);

            // --- 儲存命盤 ---
            const handleSaveProfile = useCallback(async () => {
                if (!user || !window.FirebaseSDK) return;
                const { db, doc, setDoc } = window.FirebaseSDK;
                const name = saveInputName.trim() || `命盤 ${profiles.length + 1}`;
                try {
                    await setDoc(
                        doc(db, 'artifacts', 'luminous-path-pro', 'users', user.uid, 'profiles', `profile_${Date.now()}`),
                        { name, gregYear, month, day, hour, minute, gender, isDst, order: profiles.length, createdAt: Date.now(), category: chartData?.pillars?.[2]?.stemElement || '未分類' }
                    );
                    setSaveInputName('');
                    setActiveProfileName(name);
                } catch (e) { console.error('Save profile failed:', e?.code, e?.message); alert('儲存失敗：' + (e?.message || e?.code || '請確認 Firestore 安全規則')); }
            }, [user, saveInputName, gregYear, month, day, hour, minute, gender, isDst, profiles.length, chartData]);

            // --- 刪除命盤 ---
            const handleDeleteProfile = useCallback(async (e, profileId, profileName) => {
                e.stopPropagation();
                if (!user || !window.FirebaseSDK) return;
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                try {
                    await deleteDoc(doc(db, 'artifacts', 'luminous-path-pro', 'users', user.uid, 'profiles', profileId));
                    if (activeProfileName === profileName) setActiveProfileName(null);
                } catch (e) { console.error('Delete profile failed:', e?.code); }
            }, [user, activeProfileName]);

            // --- 更新命盤五行分類（拖放後呼叫）---
            const handleCategoryChange = useCallback(async (profileId, newCategory) => {
                if (!user || !window.FirebaseSDK) return;
                // 樂觀更新本地 state
                setProfiles(prev => prev.map(p => p.id === profileId ? { ...p, category: newCategory } : p));
                try {
                    const { db, doc, updateDoc } = window.FirebaseSDK;
                    await updateDoc(doc(db, 'artifacts', 'luminous-path-pro', 'users', user.uid, 'profiles', profileId), { category: newCategory });
                } catch (e) { console.error('Category update failed:', e); }
            }, [user]);

            // --- 依五行分類分組命盤（含未分類）---
            const groupedProfiles = useMemo(() => {
                const groups = { '木': [], '火': [], '土': [], '金': [], '水': [], '未分類': [] };
                profiles.forEach(p => {
                    const cat = p.category || '未分類';
                    (groups[cat] || groups['未分類']).push(p);
                });
                return groups;
            }, [profiles]);

            const StarLabel = ({ starInfo, isDayMaster = false, isVertical = false, extraSmall = false, isFortune = false }) => {
                if (!starInfo) return null;
                const { name, element, color } = starInfo;
                const freq = (chartData && chartData.pillars) ? chartData.pillars.reduce((acc, p, i) => {
                    if (i !== 2 && p.main?.name === name) acc++;
                    p.sub?.forEach(s => { if (s.star?.name === name) acc++; });
                    return acc;
                }, 0) : 0;
                const isStrong = isFortune ? true : (threshold > 0 && !isDayMaster && freq >= threshold);
                const style = ELEMENT_STYLES[color || "none"] || ELEMENT_STYLES["none"];
                const baseStyles = "rounded border font-bold flex items-center justify-center transition-all duration-300 overflow-hidden text-center mx-auto";
                let colorStyles = (color === "none" || !color) ? (isDark ? "bg-slate-800 text-slate-400 border-slate-700" : "bg-white border-slate-300 text-slate-950") : (isDayMaster ? "bg-yellow-500 text-slate-950 border-yellow-600 shadow-md" : (isStrong ? `${style.bg} text-white border-transparent shadow-lg ring-1 ring-white/10` : (isDark ? "bg-slate-800 text-slate-200 border-slate-700 shadow-inner" : "bg-slate-100 text-slate-700 border-slate-200 shadow-sm")));
                const paddingStyles = isVertical ? "px-0.5 py-1 sm:px-1.5 sm:py-2 min-h-[4.5rem]" : "px-1.5 py-0.5 sm:px-3 sm:py-1";
                const fontStyles = isVertical ? `${extraSmall ? 'text-[9.5px]' : 'text-[11px]'} sm:text-sm leading-tight` : "text-[clamp(0.75rem,2.8vw,1.1rem)] leading-none";
                return <div className={`${baseStyles} ${colorStyles} ${paddingStyles} ${fontStyles}`} style={isVertical ? { writingMode: 'vertical-rl' } : {}}>{name}</div>;
            };

            const CharacterWithElement = ({ char, element, color, isSmall = false, isYueling = false }) => {
                if (!char) return null;
                const style = ELEMENT_STYLES[color || "none"] || ELEMENT_STYLES["none"];
                const charSize = isSmall ? "text-lg" : "text-[clamp(1.5rem,7vw,3.2rem)]";

                if (isYueling) {
                    return (
                        <div className="relative inline-flex items-center justify-center text-center font-serif transition-all duration-500">
                            <div className={`w-7 h-7 sm:w-8 sm:h-8 rounded-full flex items-center justify-center shadow-sm ${style.bg} text-white`}>
                                <span className={`${charSize} leading-none`}>{char}</span>
                            </div>
                            {element && element !== "none" && <span className="text-[clamp(0.45rem,1.5vw,0.65rem)] ml-px opacity-80 font-sans font-bold leading-none">{element}</span>}
                        </div>
                    );
                }

                return (
                    <div className="relative inline-flex items-center justify-center text-center font-serif transition-colors duration-500">
                        <span className={`${charSize} leading-none tracking-tight ${style.color}`}>{char}</span>
                        {element && element !== "none" && <span className="text-[clamp(0.45rem,1.5vw,0.65rem)] ml-px opacity-80 font-sans font-bold leading-none">{element}</span>}
                    </div>
                );
            };

            const handleLoadCase = () => { setGregYear(1977); setRocYear(66); setMonth(1); setDay(24); setHour(9); setMinute(0); setIsDst(false); setSaveInputName('命盤範例'); };
            const handleClear = () => { setGregYear(""); setRocYear(""); setMonth(1); setDay(""); setHour(-1); setMinute(0); setIsDst(false); setChartData(null); };


            // --- Admin Panel: 載入已授權用戶列表 ---
            const loadGrantedUsers = useCallback(async () => {
                if (!user) return;
                setGrantedUsersLoading(true);
                try {
                    const token = await user.getIdToken();
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ type: 'listPermissions' })
                    });
                    const data = await res.json();
                    setGrantedUsers(data.users || []);
                } catch (e) { console.error('loadGrantedUsers failed', e); }
                finally { setGrantedUsersLoading(false); }
            }, [user]);

            useEffect(() => { if (showAdminPanel && isAdmin) loadGrantedUsers(); }, [showAdminPanel, isAdmin, loadGrantedUsers]);

            // --- Admin Panel: Email 查詢（KV → Firestore 雙重 fallback）---
            const DEFAULT_PERMS = { colors: true, flowBranchColor: true, romance: false, analysis: false, calendarColors: true };
            const handleFetchAdminPerms = useCallback(async () => {
                if (!adminEmail.trim() || !user) return;
                const email = adminEmail.trim().toLowerCase();
                setAdminMsg('查詢中...');
                setAdminFoundUser(null);
                setAdminUid('');
                try {
                    const token = await user.getIdToken();
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ type: 'getPermissions', targetEmail: email })
                    });

                    if (res.status === 404) {
                        // KV 無索引 → Fallback：從 Firestore user_registry 查找
                        setAdminMsg('KV 無索引，查詢登入紀錄...');
                        try {
                            const { db, doc, getDoc } = window.FirebaseSDK;
                            const snap = await getDoc(doc(db, 'user_registry', email));
                            if (snap.exists()) {
                                const d = snap.data();
                                setAdminUid(d.uid);
                                setAdminFoundUser({ uid: d.uid, email: d.email, name: d.name });
                                setAdminPerms({ ...DEFAULT_PERMS });
                                setAdminMsg('✅ 已找到用戶（套用預設值，儲存後建立索引）');
                            } else {
                                setAdminMsg('❌ 查無此 Email（對方需先到網站登入一次）');
                            }
                        } catch (fe) { setAdminMsg('❌ 查詢失敗'); }
                        return;
                    }

                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    setAdminUid(data.uid);
                    setAdminFoundUser(data.userInfo || { uid: data.uid, email: email });
                    setAdminPerms(data.perms);
                    setAdminMsg('✅ 已讀取');
                } catch (e) { setAdminMsg('❌ 查詢失敗: ' + e.message); }
            }, [adminEmail, user]);

            // --- Admin Panel: UID 直接查詢（後備模式）---
            const handleFetchByUid = useCallback(async () => {
                const uid = adminUidInput.trim();
                if (!uid || !user) return;
                setAdminMsg('查詢中...');
                setAdminFoundUser(null);
                setAdminUid('');
                try {
                    const token = await user.getIdToken();
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ type: 'getPermissions', targetUid: uid })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    setAdminUid(data.uid || uid);
                    // userInfo 可能不完整（若從未登入過），補上 uid 作為識別
                    setAdminFoundUser(data.userInfo?.email ? data.userInfo : { uid, email: '(未知 Email)', name: '(UID 查詢)' });
                    setAdminPerms(data.perms);
                    setAdminMsg('✅ 已讀取 (UID 模式)');
                } catch (e) { setAdminMsg('❌ 查詢失敗: ' + e.message); }
            }, [adminUidInput, user]);


            const handleSaveAdminPerms = useCallback(async () => {
                if (!adminUid || !user) { setAdminMsg('❌ 請先搜尋用戶'); return; }
                setAdminSaving(true); setAdminMsg('');
                try {
                    const token = await user.getIdToken();
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ type: 'setPermissions', targetUid: adminUid, permissions: adminPerms, userInfo: adminFoundUser })
                    });
                    const data = await res.json();
                    if (data.ok) { setAdminMsg('✅ 已成功儲存'); loadGrantedUsers(); }
                    else setAdminMsg(`❌ 錯誤: ${data.error}`);
                } catch (e) { setAdminMsg('❌ 儲存失敗'); }
                finally { setAdminSaving(false); }
            }, [adminUid, adminPerms, adminFoundUser, user, loadGrantedUsers]);

            // --- Admin Panel: 列表內行 Toggle（樂觀更新 + 立即儲存）---
            const handleInlineToggle = useCallback(async (targetUser, permKey, newVal) => {
                const newPerms = { ...targetUser.perms, [permKey]: newVal };
                const info = { uid: targetUser.uid, email: targetUser.email, name: targetUser.name };
                setGrantedUsers(prev => prev.map(u => u.uid === targetUser.uid ? { ...u, perms: newPerms } : u));
                try {
                    const token = await user.getIdToken();
                    await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ type: 'setPermissions', targetUid: targetUser.uid, permissions: newPerms, userInfo: info })
                    });
                } catch (e) { console.error('inline save failed', e); }
            }, [user]);



            return (
                <div className={`flex-grow safe-top p-2 sm:p-4 md:p-8 font-sans transition-colors duration-300 ${isDark ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>

                    {/* ===== Admin Panel Modal (元件化) ===== */}
                    <AdminPanelModal
                        isDark={isDark} showAdminPanel={showAdminPanel} isAdmin={isAdmin} setShowAdminPanel={setShowAdminPanel}
