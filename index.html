                        adminSearchMode={adminSearchMode} setAdminSearchMode={setAdminSearchMode}
                        adminEmail={adminEmail} setAdminEmail={setAdminEmail}
                        adminUidInput={adminUidInput} setAdminUidInput={setAdminUidInput}
                        adminMsg={adminMsg} setAdminMsg={setAdminMsg} adminFoundUser={adminFoundUser}
                        adminPerms={adminPerms} setAdminPerms={setAdminPerms} adminSaving={adminSaving}
                        grantedUsers={grantedUsers} grantedUsersLoading={grantedUsersLoading}
                        editingUid={editingUid} setEditingUid={setEditingUid}
                        handleFetchAdminPerms={handleFetchAdminPerms} handleFetchByUid={handleFetchByUid}
                        handleSaveAdminPerms={handleSaveAdminPerms} handleInlineToggle={handleInlineToggle} loadGrantedUsers={loadGrantedUsers}
                    />




                    <div className="max-w-[1200px] mx-auto space-y-3 sm:space-y-6">

                        <div className="flex flex-col gap-3 border-b border-slate-800/50 pb-3 text-left">
                            <div className="flex justify-between items-center">
                                <h1 className={`text-2xl sm:text-3xl font-black tracking-tighter italic uppercase ${isDark ? 'text-emerald-500' : 'text-slate-950'}`}>四柱八字</h1>
                                <div className="flex items-center gap-2">
                                    {!isLoggedIn ? (
                                        <button onClick={async () => {
                                            const { auth, signInWithPopup, signInWithRedirect, GoogleAuthProvider } = window.FirebaseSDK;
                                            const provider = new GoogleAuthProvider();
                                            try {
                                                // 優先 Popup（正常瀏覽器），失敗再退到 Redirect（LINE/FB WebView）
                                                await signInWithPopup(auth, provider);
                                            } catch (e) {
                                                const fallback = ['auth/popup-blocked', 'auth/popup-closed-by-user', 'auth/cancelled-popup-request', 'auth/disallowed-useragent', 'auth/operation-not-supported-in-this-environment'];
                                                if (fallback.includes(e?.code)) {
                                                    signInWithRedirect(auth, provider);
                                                } else {
                                                    console.error('Login error:', e?.code);
                                                }
                                            }
                                        }} className="flex items-center px-3 py-1.5 rounded-full bg-white border border-slate-200 text-slate-700 text-xs font-bold shadow-sm hover:bg-slate-50 transition-all"><GoogleIcon />Google 登入</button>
                                    ) : (
                                        <div className="flex items-center gap-2 pr-2 border-r border-slate-200 dark:border-slate-800 mr-1 text-right leading-none">
                                            <div className="flex flex-col"><span className="text-[12px] font-black opacity-40 uppercase">目前登入為</span><span className={`text-[12px] font-bold ${isDark ? 'text-emerald-400' : 'text-emerald-600'}`}>{user.displayName || "User"} {isAdmin && "★"}</span></div>
                                            <button onClick={() => window.FirebaseSDK.signOut(window.FirebaseSDK.auth)} className="p-1.5 text-slate-400 hover:text-red-500 transition-all"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg></button>
                                        </div>
                                    )}
                                    {isAdmin && (
                                        <button onClick={() => setShowAdminPanel(true)} className={`p-2 rounded-full border shadow-sm transition-all text-sm ${isDark ? 'bg-slate-900 border-slate-700 text-emerald-400' : 'bg-white border-slate-200 text-emerald-600'}`} title="權限管理">⚙️</button>
                                    )}
                                    <button onClick={() => setIsDark(!isDark)} className={`p-2 rounded-full border shadow-sm transition-all ${isDark ? "bg-slate-900 border-slate-700 text-yellow-400" : "bg-white border-slate-200 text-slate-600"}`}>{isDark ? "🌙" : "☀️"}</button>
                                </div>
                            </div>

                            <div className="flex flex-wrap items-center gap-2 sm:gap-3">
                                <div className="flex items-center gap-1.5">
                                    <button onClick={handleLoadCase} className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${isDark ? 'bg-slate-800 border-slate-700 text-slate-300' : 'bg-white border-slate-200 text-slate-700 shadow-sm'}`}>載入案例</button>
                                    <button onClick={handleClear} className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${isDark ? 'bg-slate-800 border-slate-700 text-slate-300' : 'bg-white border-slate-200 text-slate-700 shadow-sm'}`}>清除歸零</button>
                                </div>
                                {isLoggedIn && (
                                    <div className="flex items-center gap-2 flex-wrap">
                                        <div className={`flex items-center p-0.5 rounded-lg border shadow-inner transition-all ${isDark ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200'}`}>
                                            <input type="text" value={saveInputName} onChange={(e) => setSaveInputName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSaveProfile()} placeholder="名稱..." className={`bg-transparent border-0 text-[10px] sm:text-xs font-bold px-1.5 py-1 outline-none w-16 sm:w-28 placeholder:opacity-30 ${isDark ? 'text-slate-200' : 'text-slate-800'}`} />
                                            <button onClick={handleSaveProfile} className="bg-emerald-600 hover:bg-emerald-500 text-white text-[12px] px-2 py-1 rounded shadow-sm transition-all">Save</button>
                                        </div>

                                        {/* 當前命盤名稱資訊框 */}
                                        {activeProfileName && (
                                            <div className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border text-xs font-bold max-w-[120px] truncate ${isDark ? 'bg-slate-800 border-slate-700 text-slate-300' : 'bg-blue-50 border-blue-200 text-blue-700'}`}>
                                                <span className="opacity-50 shrink-0 text-[9px] uppercase font-black">▶</span>
                                                <span className="truncate">{activeProfileName}</span>
                                            </div>
                                        )}

                                        <div className="relative text-left">
                                            <button
                                                onClick={() => setShowProfilesPanel(p => !p)}
                                                className={`px-3 py-2 rounded-lg text-xs font-bold shadow-md transition-all
                                                    ${showProfilesPanel
                                                        ? (isDark ? 'bg-blue-700 text-white' : 'bg-blue-700 text-white')
                                                        : 'bg-blue-600 hover:bg-blue-500 text-white'}`
                                                }
                                            >
                                                命盤管理 ({profiles.length})
                                            </button>
                                            {showProfilesPanel && (
                                                <ProfileSwitcherPanel
                                                    profiles={profiles}
                                                    groupedProfiles={groupedProfiles}
                                                    activeProfileName={activeProfileName}
                                                    isDark={isDark}
                                                    onClose={() => setShowProfilesPanel(false)}
                                                    onLoadProfile={(p) => { setGregYear(p.gregYear); setRocYear(p.gregYear - 1911); setMonth(p.month); setDay(p.day); setHour(p.hour); setMinute(p.minute); setGender(p.gender); setIsDst(p.isDst); setActiveProfileName(p.name); setShowProfilesPanel(false); }}
                                                    onDeleteProfile={handleDeleteProfile}
                                                    onCategoryChange={handleCategoryChange}
                                                />
                                            )}
                                        </div>
                                    </div>
                                )}

                            </div>

                            <div className="grid grid-cols-3 sm:grid-cols-9 gap-1.5 sm:gap-2 items-end">
                                <div className="flex flex-col gap-1 text-left"><span className="text-[10px] font-bold opacity-40 uppercase">性別</span><select value={gender} onChange={(e) => setGender(e.target.value)} className={`rounded px-1 text-xs border h-9 appearance-none ${isDark ? "bg-slate-950 border-slate-800 text-slate-100" : "bg-white border-slate-200"}`}><option value="male">男</option><option value="female">女</option></select></div>
                                <div className="flex flex-col gap-1 text-left"><span className="text-[10px] font-bold opacity-40 uppercase">西元</span><input type="number" value={gregYear} onChange={(e) => { setGregYear(e.target.value); setRocYear(e.target.value - 1911); }} className={`rounded px-1 text-xs border h-9 appearance-none ${isDark ? "bg-slate-950 border-slate-800 text-slate-100" : "bg-white border-slate-200"}`} /></div>
                                <div className="flex flex-col gap-1 text-left"><span className="text-[10px] font-bold opacity-40 uppercase">民國</span><input type="number" value={rocYear} onChange={(e) => { setRocYear(e.target.value); setGregYear(parseInt(e.target.value) + 1911); }} className={`rounded px-1 text-xs border h-9 appearance-none ${isDark ? "bg-slate-950 border-slate-800 text-slate-100" : "bg-white border-slate-200"}`} /></div>
                                <div className="flex flex-col gap-1 text-left"><span className="text-[10px] font-bold opacity-40 uppercase">月份</span><select value={month} onChange={(e) => setMonth(parseInt(e.target.value) || 1)} className={`rounded px-1 text-xs border h-9 appearance-none ${isDark ? "bg-slate-950 border-slate-800 text-slate-100" : "bg-white border-slate-200"}`}>{Array.from({ length: 12 }, (_, i) => <option key={i + 1} value={i + 1}>{i + 1}月</option>)}</select></div>
                                <div className="flex flex-col gap-1 text-left"><span className="text-[10px] font-bold uppercase">日期</span><input type="number" value={day} onChange={(e) => setDay(e.target.value)} className={`rounded px-1 text-xs border h-9 appearance-none w-full ${isDark ? "bg-slate-950 border-slate-800 text-slate-100" : "bg-white border-slate-200"}`} /></div>
                                <div className="flex flex-col gap-1 text-left"><span className="text-[10px] font-bold opacity-40 uppercase">時辰</span><select value={hour} onChange={(e) => setHour(parseInt(e.target.value))} className={`rounded px-1 text-[10px] sm:text-xs border h-9 appearance-none ${isDark ? "bg-slate-950 border-slate-800 text-slate-100" : "bg-white border-slate-200"}`}>{hourOptions.map((o, i) => <option key={i} value={o.val}>{o.label}</option>)}</select></div>
                                <div className="flex flex-col gap-1 text-left"><span className="text-[10px] font-bold opacity-40 uppercase">分鐘</span><input type="number" value={minute} onChange={(e) => setMinute(e.target.value)} className={`rounded px-1 text-xs border h-9 appearance-none w-full ${isDark ? "bg-slate-950 border-slate-800 text-slate-100" : "bg-white border-slate-200"}`} /></div>
                                <div className="flex items-center gap-1 h-9 col-span-2 sm:col-span-1 text-left"><input type="checkbox" id="dst" checked={isDst} onChange={(e) => setIsDst(e.target.checked)} className="w-4 h-4 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500" /><label htmlFor="dst" className={`text-[11px] font-bold uppercase ${isDark ? 'text-slate-500' : 'text-slate-500'}`}>夏令時間</label></div>
                            </div>
                        </div>

                        {error && <div className="p-3 bg-red-500/10 border border-red-500 text-red-500 text-xs font-bold rounded-lg mb-4">{error}</div>}

                        {/* ===== 命盤四柱表格 (元件化) ===== */}
                        <BaziPillarTable
                            chartData={chartData} isLoading={isLoading} isDark={isDark} hour={hour}
                            perms={perms} ELEMENT_STYLES={ELEMENT_STYLES} StarLabel={StarLabel} CharacterWithElement={CharacterWithElement}
                        />


                        <div className="flex flex-wrap items-center gap-3 py-1 overflow-x-auto no-scrollbar text-center">
                            <div className="flex items-center gap-2 mx-auto sm:mx-0">
                                <span className="text-[10px] sm:text-xs font-bold uppercase text-slate-500 whitespace-nowrap">十神標記:</span>
                                <div className="flex gap-1.5">
                                    {[0, 2, 3, 4, 5, 6].map(n => (
                                        <button key={n} onClick={() => setThreshold(n)} className={`w-8 h-8 sm:w-10 sm:h-10 rounded-lg border text-[10px] sm:text-sm font-bold transition-all flex items-center justify-center shrink-0 ${threshold === n ? 'bg-emerald-600 border-emerald-500 text-white shadow-lg' : isDark ? 'bg-slate-800 border-slate-700 text-slate-400' : 'bg-white border-slate-200 text-slate-500 shadow-sm'}`}>{n || 'OFF'}</button>
                                    ))}
                                </div>
                            </div>
                            {!isLoggedIn && <span className="text-[9px] font-bold text-slate-950 dark:text-slate-400 italic">登入解鎖更多功能</span>}
                        </div>

                        {perms?.analysis && <AnalysisBox title="六十甲子" content={chartData?.dayPillarAnalysis} isDark={isDark} />}

                        <div className="divider-gradient my-2 opacity-30"></div>

                        {chartData && chartData.timing && (
                            <div className={`p-4 sm:p-6 rounded-2xl border ${isDark ? "bg-slate-900/60 border-slate-700" : "bg-white border-slate-200 shadow-sm"} text-left`}>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <p className="text-[12px] font-bold text-emerald-500 uppercase tracking-widest">出生節氣資訊</p>
                                        <p className="text-xs sm:text-sm font-bold opacity-90">農曆：<span className="text-emerald-600 dark:text-emerald-400">{toTC(chartData.timing.lunarStr)}</span></p>
                                        <p className="text-[11px] sm:text-xs text-slate-500">
                                            {toTC(chartData.timing.prevNodeName)}後 {chartData.timing.prevD}天 | {toTC(chartData.timing.nextNodeName)}前 {chartData.timing.nextD}天
                                        </p>
                                    </div>
                                    <div className="space-y-1">
                                        <p className="text-[12px] font-bold text-blue-500 uppercase tracking-widest">起運資訊</p>
                                        <p className="text-xs sm:text-sm font-bold">約為 <span className="text-blue-500">{chartData.timing.startDate}</span></p>
                                        <p className="text-[11px] font-bold opacity-60 text-blue-600">出生後 {chartData.timing.startAge.y}歲 {chartData.timing.startAge.m || 0}個月 {chartData.timing.startAge.d || 0}天 起大運</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ===== 大運流年區塊 (元件化) ===== */}
                        <FortuneSection
                            chartData={chartData} isDark={isDark} perms={perms}
                            ELEMENT_STYLES={ELEMENT_STYLES} CURRENT_REAL_YEAR={CURRENT_REAL_YEAR}
                            StarLabel={StarLabel} RomanceIcon={BoundRomanceIcon} WealthIcon={BoundWealthIcon} HorseIcon={BoundHorseIcon}
                        />

                        {/* ===== 流月流日萬年曆 (元件化) ===== */}
                        <CalendarSection
                            isDark={isDark} calYear={calYear} setCalYear={setCalYear}
                            calMonth={calMonth} setCalMonth={setCalMonth}
                            calendarData={calendarData} isCalLoading={isCalLoading}
                            perms={perms} ELEMENT_STYLES={ELEMENT_STYLES} RomanceIcon={BoundRomanceIcon} WealthIcon={BoundWealthIcon} HorseIcon={BoundHorseIcon}
                        />


                        <div className="mt-10 mb-6 pb-6 border-slate-200 dark:border-slate-800 text-center"><p className="text-[clamp(11.5px,2.8vw,16px)] leading-relaxed md:leading-loose opacity-70 font-medium max-w-[50rem] md:max-w-[85ch] mx-auto font-serif italic tracking-wide">“命理不是預言未來的水晶球，而是一份解碼你的「出廠設定」說明書。命盤揭示的是每個人獨一無二的原始劇本。學命理，是學會閱讀自己，用理解取代迷信。理解命的邏輯，就能在敬畏中找到自信，讓命運掌握在自己手裡。”</p></div>
                    </div>

                    <footer className={`py-8 sm:py-16 border-t mt-auto transition-colors duration-300 ${isDark ? 'bg-slate-950 border-slate-800 text-slate-400' : 'bg-white border-slate-200 text-slate-500'}`}>
                        <div className="max-w-[1200px] mx-auto px-4 sm:px-8 text-center sm:text-left">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-6 text-left">
                                <div className="flex flex-row items-center justify-between md:justify-start gap-4 sm:gap-10 w-full md:w-auto">
                                    <div className="flex flex-col"><span className="text-[10px] uppercase font-black tracking-widest opacity-60 leading-tight">Created by</span><span className="text-xs sm:text-sm font-bold tracking-tight">kasimchang</span></div>
                                    <div className="h-8 w-px bg-slate-200 dark:bg-slate-800 hidden md:block"></div>
                                    <a href="https://www.msf.org.tw/" target="_blank" className="group flex flex-row items-center gap-2"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/b/b9/M%C3%A9decins_Sans_Fronti%C3%A8res_%28logo%29.svg/500px-M%C3%A9decins_Sans_Fronti%C3%A8res_%28logo%29.svg.png" alt="MSF" className="h-7 sm:h-10 w-auto object-contain" onError={(e) => e.target.style.display = 'none'} /><span className="text-[9px] uppercase font-black text-red-500/80 leading-none whitespace-nowrap">捐款支持做好事</span></a>
                                    <div className="h-8 w-px bg-slate-200 dark:bg-slate-800 hidden md:block"></div>
                                    <div className="flex flex-col">
                                        <span className="text-[10px] uppercase font-black tracking-widest opacity-60 leading-tight">Copyright</span>
                                        <span className="text-xs sm:text-sm font-bold tracking-tight italic whitespace-nowrap">© 2026 LuminousPath</span>
                                    </div>
                                </div>
                                <div className="flex flex-col items-center md:items-end text-center md:text-right w-full md:w-auto mt-2 md:mt-0">
                                    <span className="text-[10px] uppercase font-black tracking-[0.3em] text-emerald-500 mb-1 leading-none">LuminousPath Pro</span>
                                    <p className="text-[11px] font-medium opacity-60">東方命理結構分析引擎</p>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>

</html>
